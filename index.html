<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1B1B47">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Star-Lord">
<title>Star-Lord Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#E9EAF1; --card:#FFFFFF; --card-2:#F0F1F6;
  --ink:#1B1C32; --ink-soft:#4C4E66; --ink-faint:#8A8CA1;
  --pine:#272763; --pine-d:#1B1B47; --moss:#5FA336;
  --clay:#D8362F; --amber:#F2A81D; --ok:#5FA336;
  --line:#D7D9E4; --line-soft:#E5E6EF;
  --c-community:#D8362F; --c-creative:#7E4196; --c-outdoors:#5FA336; --c-growth:#EF8022;
  --shadow:0 2px 0 rgba(27,28,50,.05), 0 8px 24px -12px rgba(27,28,50,.30);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Hanken Grotesk',-apple-system,sans-serif;background:var(--paper);color:var(--ink);
  background-image:radial-gradient(circle at 12% 18%,rgba(255,255,255,.55),transparent 38%),
    radial-gradient(circle at 88% 82%,rgba(39,39,99,.06),transparent 42%);
  -webkit-font-smoothing:antialiased;line-height:1.5;}
.app{max-width:600px;margin:0 auto;padding:0 0 96px;min-height:100%}
header{padding:16px 18px;position:sticky;top:0;z-index:30;
  background:linear-gradient(135deg,#322F7C 0%,#222250 52%,#1B1B45 100%);
  box-shadow:0 6px 18px -10px rgba(27,28,50,.5);overflow:hidden}
header:before{content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    radial-gradient(1.3px 1.3px at 14% 30%,rgba(255,255,255,.9),transparent),
    radial-gradient(1px 1px at 33% 72%,rgba(255,255,255,.6),transparent),
    radial-gradient(1.4px 1.4px at 57% 22%,rgba(255,255,255,.78),transparent),
    radial-gradient(1px 1px at 79% 58%,rgba(255,255,255,.55),transparent),
    radial-gradient(1px 1px at 90% 27%,rgba(255,255,255,.72),transparent),
    radial-gradient(1px 1px at 45% 86%,rgba(255,255,255,.5),transparent),
    radial-gradient(1.2px 1.2px at 70% 82%,rgba(255,255,255,.6),transparent),
    radial-gradient(1px 1px at 24% 52%,rgba(255,255,255,.5),transparent);}
.brand{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.mark{width:46px;height:46px;flex:none;object-fit:contain;border-radius:9px}
.brand h1{font-family:'Fraunces',serif;font-size:21px;font-weight:600;letter-spacing:-.01em;line-height:1.08;color:#fff}
.brand .tag{font-size:11.5px;color:rgba(255,255,255,.6);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:3px}
.spark{color:var(--amber);font-size:.6em;margin-left:5px;display:inline-block;
  animation:twinkle 2.9s ease-in-out infinite;vertical-align:0.18em}
@keyframes twinkle{0%,100%{opacity:.4;transform:scale(.85) rotate(0deg)}
  50%{opacity:1;transform:scale(1.15) rotate(15deg)}}
.view{padding:4px 16px 0;animation:rise .32s ease}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.view-title{font-family:'Fraunces',serif;font-size:21px;font-weight:600;margin:14px 2px 4px}
.view-sub{font-size:13.5px;color:var(--ink-soft);margin:0 2px 14px}
.card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:16px;margin-bottom:13px;box-shadow:var(--shadow)}
.card.flat{box-shadow:none}
.card h3{font-family:'Fraunces',serif;font-size:16.5px;font-weight:600;margin-bottom:3px}
.card .hint{font-size:12.5px;color:var(--ink-faint);margin-bottom:11px}
.note{background:var(--card-2);border:1.5px dashed var(--clay);border-radius:13px;padding:13px 14px;margin-bottom:13px}
.note .lbl{font-size:10.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--clay);display:block;margin-bottom:4px}
.note p{font-size:13px;color:var(--ink-soft)}
.steps{display:flex;gap:8px;justify-content:center;margin:4px 2px 16px}
.chv{width:30px;height:28px;flex:none}
.chv .cf{fill:#A6A9BC;transition:fill .42s ease}
.chv .cl{fill:#E4E5EE;transition:fill .42s ease}
.chv.on .cf{fill:var(--pine)}
.chv.on .cl{fill:#CBCDDC}
.chv.on{animation:chvpulse 1.7s ease-in-out infinite}
.chv.done .cf{fill:#474B6E}
.chv.done .cl{fill:var(--amber)}
.chv.done{filter:drop-shadow(0 0 5px rgba(242,168,29,.65))}
.chv.just-locked{animation:chvlock .62s ease}
@keyframes chvpulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes chvlock{0%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(242,168,29,0))}
  35%{transform:scale(1.26);filter:drop-shadow(0 0 13px rgba(242,168,29,1))}
  100%{transform:scale(1);filter:drop-shadow(0 0 5px rgba(242,168,29,.65))}}
.gate-row{display:flex;gap:5px;justify-content:center;margin-bottom:12px;flex-wrap:wrap}
.conn-line{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  color:var(--ink-faint);margin-top:9px}
.mtn{position:relative;width:100%;aspect-ratio:3/2;border-radius:12px;overflow:hidden;margin:4px 0 6px;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.08),0 2px 8px rgba(20,20,54,.18)}
.mtn-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.mtn-svg{position:absolute;inset:0;width:100%;height:100%}
.mtn .mn{font-family:inherit}
.mtn .mn circle{fill:rgba(28,28,71,.72);stroke:rgba(255,255,255,.7);stroke-width:1.3}
.mtn .mn text{fill:#EDEEFB;font-weight:800;text-anchor:middle}
.mtn .mn.done circle{fill:var(--amber);stroke:#FFF3D6;stroke-width:1.6}
.mtn .mn.done text{fill:#1B1B47}
.mtn .mn.auto circle{fill:rgba(28,28,71,.55);stroke:rgba(200,203,232,.6);stroke-dasharray:2.5 2}
.mtn .mn.auto text{fill:#C9CBE8}
.mtn .mn.todo circle{stroke:var(--amber);stroke-width:1.9}
.mtn .climber{fill:#FFE9A8;font-size:15px;text-anchor:middle;
  filter:drop-shadow(0 0 3px rgba(255,214,120,.9));animation:mbounce 2.4s ease-in-out infinite}
.mtn .mflag{animation:twinkle 2.9s ease-in-out infinite}
@keyframes mbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.chart-row{display:flex;align-items:center;gap:2px;padding:6px 2px;border-bottom:1px solid var(--line-soft)}
.chart-row:not(.chart-head){cursor:pointer}
.chart-head{border-bottom:1.5px solid var(--line)}
.chart-head .ccell{font-size:8.5px;font-weight:800;text-transform:uppercase;color:var(--ink-faint)}
.cname{flex:1;min-width:0;font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccell{flex:none;width:30px;text-align:center;display:flex;justify-content:center;align-items:center}
.cdot{width:13px;height:13px;border-radius:50%;background:var(--card-2);border:1.5px solid var(--line);display:inline-block}
.cdot.on{background:var(--amber);border-color:var(--amber);box-shadow:0 0 4px rgba(242,168,29,.6)}
.csia{font-size:10.5px;font-weight:800;width:19px;height:19px;border-radius:50%;display:inline-flex;
  align-items:center;justify-content:center;background:var(--card-2);border:1.5px solid var(--line);color:var(--ink-soft)}
.csia.on{background:var(--amber);border-color:var(--amber);color:#1B1B47}
.ppill{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;
  color:var(--ink-soft);background:var(--card-2);border:1px solid var(--line);border-radius:20px;
  padding:2px 8px 2px 5px;margin-left:6px;vertical-align:1px}
.pdot{width:9px;height:9px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.15)}
.pat-hd{display:flex;align-items:center;gap:8px;font-size:14px;padding-bottom:6px;border-bottom:1.5px solid var(--line)}
.pat-hd .pdot{width:12px;height:12px}
.rolebadge{flex:none;font-size:9.5px;font-weight:800;letter-spacing:.05em;padding:3px 8px;
  border-radius:12px;background:var(--pine);color:#fff}
.climb-list{margin-top:2px}
.ob-box{background:var(--card-2);border:1px solid var(--line);border-radius:10px;padding:9px 10px;margin:4px 0 6px}
.ob-hd{font-size:11px;color:var(--ink-soft);margin-bottom:7px;line-height:1.3}
.ob-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ob-cell{display:flex;flex-direction:column;gap:2px}
.ob-cell label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint)}
.ob-cell input{width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:7px;font-size:13px;font-family:inherit}
.climb-row{display:flex;gap:9px;align-items:flex-start;padding:7px 2px;border-bottom:1px solid var(--line-soft);cursor:pointer}
.climb-row .climb-txt{font-size:12.5px;line-height:1.35}
.climb-row .climb-txt span{color:var(--ink-faint);font-size:11.5px}
.climb-row.don .climb-txt{color:var(--ink-faint)}
.climb-row.don .climb-txt b{text-decoration:line-through;font-weight:600}
.peak-gate{display:flex;gap:5px;margin:4px 0 2px}
.peak-chev{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;min-width:0}
.peak-chev .chv{width:26px;height:24px}
.peak-chev .pcl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;
  color:var(--ink-faint);text-align:center;line-height:1.06}
.step-tag{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.step-tag .n{font-family:'Fraunces',serif;font-size:13px;font-weight:700;color:var(--clay);
  letter-spacing:.06em;text-transform:uppercase}
label.fld{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;color:var(--ink-soft);margin:11px 0 5px}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;font-family:inherit;
  font-size:15px;color:var(--ink);background:var(--card-2);border:1.5px solid var(--line);
  border-radius:10px;padding:11px 12px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--pine);background:#fff}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%235D5440' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat;background-position:right 13px center;padding-right:34px}
.btn{font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border:none;border-radius:11px;
  padding:13px 18px;transition:transform .08s ease,filter .15s ease}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--pine);color:#F6F1E2}
.btn.clay{background:var(--clay);color:#F6F1E2}
.btn.ghost{background:transparent;color:var(--ink-soft);border:1.5px solid var(--line)}
.btn.full{width:100%}
.btn.sm{padding:8px 12px;font-size:13px;border-radius:9px}
.btn-row{display:flex;gap:9px;margin-top:14px}
.btn-row .btn{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:13px;font-weight:600;padding:8px 13px;border-radius:999px;cursor:pointer;
  border:1.5px solid var(--line);background:var(--card-2);color:var(--ink-soft)}
.chip.on{color:#fff;border-color:transparent}
.chip[data-area="Community"].on{background:var(--c-community)}
.chip[data-area="Creative"].on{background:var(--c-creative)}
.chip[data-area="Outdoors"].on{background:var(--c-outdoors)}
.chip[data-area="Personal Growth"].on{background:var(--c-growth)}
.tgl{display:flex;align-items:center;gap:11px;padding:9px 0;cursor:pointer}
.tgl .sw{width:44px;height:26px;border-radius:13px;background:var(--line);flex:none;position:relative;transition:.15s}
.tgl.on .sw{background:var(--pine)}
.tgl .sw:after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.15s}
.tgl.on .sw:after{left:21px}
.tgl .tl{font-size:13.5px;font-weight:600}
.stage-hd{display:flex;align-items:center;gap:8px;padding:10px 11px;background:var(--pine-d);
  color:#EFE8D4;border-radius:9px;margin:9px 0 5px;cursor:pointer;font-family:'Fraunces',serif;
  font-weight:600;font-size:13.5px}
.stage-hd .cnt{margin-left:auto;font-size:11px;opacity:.8;font-family:'Hanken Grotesk';font-weight:700}
.stage-hd .ar{transition:.2s}
.skrow{display:flex;gap:9px;padding:9px 10px;border-radius:9px;border:1.5px solid var(--line);
  background:var(--card-2);margin-bottom:5px;cursor:pointer;align-items:flex-start}
.skrow.on{background:#fff;border-color:var(--pine)}
.skbox{width:20px;height:20px;flex:none;border-radius:6px;border:2px solid var(--line);margin-top:1px;
  display:flex;align-items:center;justify-content:center}
.skrow.on .skbox{background:var(--pine);border-color:var(--pine)}
.sktext{font-size:12.5px;line-height:1.42}
.roll-row{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;
  border:1.5px solid var(--line);background:var(--card-2);margin-bottom:8px;cursor:pointer}
.roll-row.present{background:#fff;border-color:var(--pine)}
.roll-row .tick{width:24px;height:24px;flex:none;border-radius:7px;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center}
.roll-row.present .tick{background:var(--pine);border-color:var(--pine)}
.roll-row .nm{font-weight:600;font-size:15px;flex:1}
.roll-row .sec{font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.05em}
.peak-star{color:var(--amber);font-size:13px}
.rec-row{padding:12px;border-radius:12px;border:1.5px solid var(--line);background:var(--card-2);margin-bottom:10px}
.rec-row .nm{font-weight:600;font-size:14.5px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.seg{display:flex;gap:5px}
.seg button{flex:1;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:9px 4px;
  border-radius:8px;border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);transition:all .12s ease}
.seg button.on[data-c="-"]{background:var(--ink-faint);color:#fff;border-color:transparent}
.seg button.on[data-c="P"]{background:var(--moss);color:#fff;border-color:transparent}
.seg button.on[data-c="A"]{background:var(--amber);color:#fff;border-color:transparent}
.seg button.on[data-c="L"]{background:var(--clay);color:#fff;border-color:transparent}
.mini-cap{font-size:10.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;
  letter-spacing:.05em;margin:9px 0 4px}
.areapick{display:flex;flex-wrap:wrap;gap:5px}
.areapick .ap{font-size:11px;font-weight:700;padding:5px 10px;border-radius:7px;cursor:pointer;
  border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft)}
.areapick .ap.on{color:#fff;border-color:transparent}
.skchip{font-size:11.5px;font-weight:600;padding:6px 9px;border-radius:8px;cursor:pointer;
  border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);margin:0 5px 5px 0;
  display:inline-block;line-height:1.35}
.skchip.on{background:var(--pine);color:#fff;border-color:transparent}
.numfield{display:inline-flex;align-items:center;gap:7px;margin:8px 12px 0 0}
.numfield label{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase}
.numfield input{width:78px;flex:none;padding:7px 9px;font-size:14px}
.skill-tag{display:inline-flex;align-items:center;gap:7px;background:var(--card-2);border:1.5px solid var(--line);
  border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;margin:0 6px 6px 0;line-height:1.35}
.skill-tag .rm{cursor:pointer;color:var(--clay);font-weight:700;font-size:14px}
.addrow{display:flex;gap:8px;margin-top:8px}
.addrow input{flex:1}
.wk{display:flex;align-items:center;gap:9px;padding:9px;border-radius:11px;background:var(--card-2);
  border:1.5px solid var(--line);margin-bottom:7px;flex-wrap:wrap}
.wk.special .wn{background:var(--clay)}
.wk.event{border-style:dashed;border-color:var(--clay);background:#F2E9D6}
.wk.current{box-shadow:0 0 0 2.5px var(--pine);border-color:var(--pine)}
.wk .wn{width:34px;height:34px;flex:none;border-radius:9px;background:var(--pine);color:#F6F1E2;
  font-family:'Fraunces',serif;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
.wk.event .wn{background:var(--amber);border-radius:50%;font-size:15px}
.wk select{flex:1;min-width:108px}
.wk .toprow{display:flex;gap:8px;width:100%;align-items:center}
.wk .fullrow{display:flex;gap:7px;width:100%}
.wk .fullrow input{flex:1}
.wk .spec-label{flex:1;font-weight:700;font-size:13px;color:var(--clay)}
.wk .areachips{display:flex;flex-wrap:wrap;gap:5px;width:100%}
.wk .areachips .chip{font-size:11px;padding:5px 9px}
.cur-btn{font-size:10.5px;font-weight:700;border:1.5px solid var(--line);background:var(--card);
  color:var(--ink-soft);border-radius:7px;padding:6px 9px;cursor:pointer;flex:none}
.cur-btn.on{background:var(--pine);color:#fff;border-color:transparent}
.addevent{display:block;margin:1px auto 8px;background:none;border:none;color:var(--clay);
  font-size:11.5px;font-weight:700;cursor:pointer;padding:2px 8px;letter-spacing:.03em}
.roles-bar{display:flex;align-items:center;gap:8px;width:100%;margin-top:6px;padding:8px 10px;
  background:var(--card);border:1.5px solid var(--line);border-radius:9px;cursor:pointer}
.wncol{display:flex;flex-direction:column;align-items:center;gap:3px;flex:none}
.wkdate{width:106px;padding:5px 6px;font-size:11px;border-radius:7px}
.wkdate-s{font-size:10.5px;font-weight:700;color:var(--ink-faint);text-align:center;line-height:1.1}
.datepair{display:flex;gap:8px;width:100%}
.datepair .dp{flex:1;display:flex;flex-direction:column;gap:3px}
.datepair .dp label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);letter-spacing:.04em}
.datepair .dp input{padding:7px 8px;font-size:13px}
.evdel{width:100%;margin-top:8px;background:none;border:1.5px solid var(--line);color:var(--clay);
  font-size:12px;font-weight:700;border-radius:8px;padding:9px;cursor:pointer}
.evdel:active{transform:scale(.98)}
.calbtn{flex:none;border:1.5px solid var(--line);background:var(--card);border-radius:8px;
  padding:6px 9px;font-size:13px;cursor:pointer}
.ratechip{flex:none;align-self:center;font-size:10px;font-weight:800;letter-spacing:.05em;
  padding:5px 9px;border-radius:14px;background:var(--card-2);border:1px solid var(--line);color:var(--ink-soft)}
.tchips{display:flex;gap:6px;margin:0 0 12px;flex-wrap:wrap}
.tchip{flex:1;min-width:0;padding:8px 4px;border-radius:9px;border:1.5px solid var(--line);
  background:var(--card);font-size:12px;font-weight:700;cursor:pointer;color:var(--ink-soft);white-space:nowrap}
.tchip.on{background:var(--pine);border-color:var(--pine);color:#fff}
.linkrow{display:flex;align-items:center;gap:9px;padding:8px 2px;border-bottom:1px solid var(--line-soft)}
.linkrow .rn{flex:1;font-size:13.5px;font-weight:600;min-width:0}
.linkrow a{text-decoration:none;text-align:center}
.inv-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:9px}
.inv-chev{position:relative;flex:none;width:30px}
.inv-chev .chv{width:30px;height:28px}
.inv-n{position:absolute;top:5px;left:0;width:30px;text-align:center;font-size:10px;font-weight:800;color:#1B1B47}
.inv-row textarea{flex:1;min-height:46px}
.callbtn{text-decoration:none;text-align:center}
main textarea{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:9px 11px;
  font:inherit;font-size:13.5px;background:var(--card);min-height:64px;resize:vertical}
.roles-bar .rl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--clay);flex:none}
.roles-bar .rs{font-size:12px;color:var(--ink-soft);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role-list{width:100%;margin-top:6px}
.role-row{display:flex;align-items:center;gap:8px;padding:6px 2px}
.role-row .rn{font-size:13px;font-weight:600;flex:1}
.rseg{display:flex;gap:4px;flex:none}
.rseg button{font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;padding:6px 11px;
  border-radius:7px;border:1.5px solid var(--line);background:var(--card-2);color:var(--ink-soft)}
.rseg button.on[data-r="-"]{background:var(--ink-faint);color:#fff;border-color:transparent}
.rseg button.on[data-r="L"]{background:var(--clay);color:#fff;border-color:transparent}
.rseg button.on[data-r="A"]{background:var(--amber);color:#fff;border-color:transparent}
.bal{display:flex;flex-direction:column;gap:9px}
.bal-row{display:flex;align-items:center;gap:9px}
.bal-row .bn{font-size:12px;font-weight:700;width:108px;flex:none}
.bal-track{flex:1;height:13px;background:var(--card-2);border-radius:7px;overflow:hidden;border:1px solid var(--line)}
.bal-fill{height:100%;border-radius:7px}
.bal-row .bc{font-size:12px;font-weight:700;color:var(--ink-soft);width:30px;text-align:right}
.scout{border:1.5px solid var(--line);border-radius:13px;background:var(--card-2);margin-bottom:9px;overflow:hidden}
.scout .hd{display:flex;align-items:center;gap:9px;padding:12px;cursor:pointer}
.scout .hd .nm{font-weight:600;font-size:15px;flex:1}
.scout .hd .sec{font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase}
.mno{font-size:11px;font-weight:700;color:var(--ink-faint)}
.namerow{display:flex;gap:7px;margin-bottom:6px}
.namerow input:first-child{flex:2}
.namerow input:last-child{flex:1}
.nameview{display:flex;align-items:center;gap:9px;margin-bottom:8px;padding:9px 11px;
  background:var(--card);border:1.5px solid var(--line);border-radius:9px}
.nameview .nv-txt{flex:1;font-size:13.5px;font-weight:600}
.scout .body{padding:0 12px 13px;display:none}
.scout.open .body{display:block}
.prog-grid{display:flex;flex-direction:column;gap:7px;margin:6px 0 10px}
.prog-row{display:flex;align-items:center;gap:8px}
.prog-row .pn{font-size:12px;font-weight:700;width:108px;flex:none}
.prog-track{flex:1;height:11px;background:var(--card);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.prog-fill{height:100%}
.prog-row .pc{font-size:11.5px;font-weight:700;width:36px;text-align:right;color:var(--ink-soft)}
.al-line{display:flex;gap:8px;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:10px}
.al-line b{color:var(--ink)}
.subhd{font-family:'Fraunces',serif;font-size:13.5px;font-weight:600;margin:13px 0 6px;
  padding-top:11px;border-top:1px solid var(--line-soft)}
.award2{display:flex;gap:9px;margin-bottom:8px}
.awcard{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:9px 10px}
.awcard .at{font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--ink-faint);letter-spacing:.04em}
.awcard .av{font-family:'Fraunces',serif;font-size:18px;font-weight:700}
.awcard .an{font-size:10.5px;color:var(--clay);font-weight:700}
.awcard .pr{display:flex;align-items:center;gap:5px;margin-top:6px}
.awcard .pr label{font-size:9.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase}
.awcard .pr input{width:54px;padding:4px 6px;font-size:12px}
.sia-row{display:flex;gap:8px;align-items:flex-start;padding:8px 10px;border-radius:9px;
  background:var(--card);border:1.5px solid var(--line);margin-bottom:6px}
.sia-row .si{flex:1;min-width:0}
.sia-row .si .sa{font-size:12.5px;font-weight:700}
.sia-row .si .sd{font-size:11.5px;color:var(--ink-soft)}
.sia-row .si .sx{font-size:10.5px;color:var(--ink-faint)}
.mini-row{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.mini-row label{font-size:11.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase}
.summary{white-space:pre-wrap;font-family:'Hanken Grotesk',monospace;font-size:12px;
  background:var(--pine-d);color:#EFE8D4;border-radius:12px;padding:14px;line-height:1.6}
.bigtick{width:54px;height:54px;border-radius:50%;background:var(--ok);margin:0 auto 10px;
  display:flex;align-items:center;justify-content:center}
.nlog{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:10px;
  border:1.5px solid var(--line);background:var(--card-2);margin-bottom:7px}
.nlog .nd{font-family:'Fraunces',serif;font-weight:700;font-size:12px;text-align:center;
  width:42px;flex:none;line-height:1.15;color:var(--pine)}
.nlog .ni{flex:1;min-width:0}
.nlog .ni .t{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nlog .ni .s{font-size:11.5px;color:var(--ink-faint)}
.areadot{width:9px;height:9px;border-radius:50%;flex:none}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.tbl th,.tbl td{text-align:left;padding:7px 6px;border-bottom:1px solid var(--line-soft)}
.tbl th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint)}
.tbl td b{font-family:'Fraunces',serif}
.rule-li{font-size:13px;color:var(--ink-soft);margin:7px 0;padding-left:16px;position:relative}
.rule-li:before{content:"";position:absolute;left:0;top:7px;width:7px;height:7px;
  background:var(--moss);border-radius:2px;transform:rotate(45deg)}
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--card);
  border-top:1.5px solid var(--line);display:flex;max-width:600px;margin:0 auto;
  padding:7px 6px calc(7px + env(safe-area-inset-bottom))}
nav button{flex:1;background:none;border:none;cursor:pointer;padding:6px 2px;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--ink-faint)}
nav button.on{color:var(--pine)}
nav button .nl{font-size:9.5px;font-weight:700}
.empty{text-align:center;color:var(--ink-faint);font-size:13px;padding:18px 8px}
.warn{font-size:12px;color:var(--clay);font-weight:600;margin-top:6px}
.del-x{background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:18px;padding:2px 6px;line-height:1;flex:none}
.curbanner{display:flex;align-items:center;gap:9px;background:var(--pine-d);color:#EFE8D4;
  border-radius:11px;padding:11px 13px;margin-bottom:11px}
.modal-bg{position:fixed;inset:0;background:rgba(35,31,22,.6);z-index:100;display:none;
  align-items:center;justify-content:center;padding:24px}
.modal-bg.show{display:flex}
.modal-card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:18px;max-width:420px;width:100%;box-shadow:var(--shadow);animation:rise .2s ease}
.modal-card h4{font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin-bottom:7px}
.modal-card p{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px}
.modal-card textarea{margin-bottom:12px;min-height:120px}
.curbanner .cl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.7}
.curbanner .ct{font-family:'Fraunces',serif;font-size:14px;font-weight:600}
.gate-footer{text-align:center;padding:20px 8px 4px;opacity:.6}
.gate-footer .chevrons{display:flex;justify-content:center;gap:4px;margin-bottom:8px}
.gate-footer .chv{width:18px;height:17px}
.gate-footer .desig{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint)}
.stg{display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;border-radius:50%;color:#fff;font-weight:700;font-size:11px;line-height:1}
.stg.mv{box-shadow:0 0 0 2px var(--amber)}
.stg.z{background:var(--line);color:var(--ink-faint);font-weight:600}
#printArea{display:none}
@media print{
  body>*{display:none!important}
  #printArea{display:block!important;font-family:Georgia,serif;color:#000}
  #printArea h1{font-size:20px;margin:0 0 2px}
  #printArea .sub{font-size:12px;color:#444;margin:0 0 12px}
  #printArea table{width:100%;border-collapse:collapse;font-size:12px}
  #printArea th,#printArea td{border:1px solid #999;padding:5px 7px;text-align:left;vertical-align:top}
  #printArea th{background:#eee}
  #printArea tr.ev td{background:#f6f0df}
}
</style>

<script>
const OAS_SKILLS={"Bushcraft":[[1,"Stage 1 — Introductory Skills",["I know why it is important to stick to trails when outdoors.","I know about the 'Buddy' system.","I know to stop when I get lost on activities.","I know my address and location in an emergency.","I know 3 reasons for having a shelter when sleeping outdoors.","I can strike a match.","I can collect sticks for preparing a campfire.","I can demonstrate stop, drop and roll, and how that can be used in an emergency situation.","I can find the emergency exit and muster point at my Scout Hall.","I have participated in a game that requires basic navigational skills.","I can hang a clothes line at camp with a clove hitch or other knot.","I know how to pack ropes away.","I know what is in a dilly bag/mess kit and can keep it clean at camp.","I can talk about what I enjoyed, learnt, or improved upon, by playing a navigational game."]],[2,"Stage 2",["I have explained what impact I can have on local vegetation while participating in activities.","I have discussed the appropriate action I should take in the case of an accident. Consider DRSABCD.. Consider emergency services. Consider other small accidents that may happen while hiking.","I can discuss what safety precautions I should take before going out in the Bush. Consider contacting authorities and informing others. Consider other small accidents that may happen.","I know how to contact the emergency services.","I can state how many degrees there are on a compass and what degrees the cardinal points are.","I know the rules for hygiene at camp. Consider cleaning equipment/preparing food. Consider toileting.","I can protect myself when exposed to the sun while outdoors.","I can cook a snack in a fire.","I know how much water I should carry when on a hike or when taking part in an outdoor activity.","I can demonstrate a correct way to build a safe fireplace in the Bush.","I understand the basic dangers of fire, and how to be safe around them.","I can establish and find the four cardinal directions (north, south, east, west) without a magnetic compass or any electronic means.","I can demonstrate 3 knots and apply them in an activity.","I have talked about what I enjoyed, learned, or improved upon from at least two bushcraft activities.","I can suggest what I would do differently for a future bushcraft activity."]],[3,"Stage 3",["I can explain the importance of wearing the right clothing while outdoors.","I know about native flora and fauna and the risks of the benefits they pose. Consider what is poisonous. Consider what is good for wounds or to eat.","I know how and where to get the latest weather forecast for the areas I will be doing activities in.","I know the First Aid treatment for burns from hot water, grease and food.","I know how to treat cuts an minor bleeding.","I know what DRSABCD stand for and how to apply it in First Aid situations.","I can cook a meal using a camp stove.","I can name 5 different situations that could be classified as an emergency in the outdoors and can respond to a mock emergency for one of these situations.","I can identify the Southern Cross in the night sky and then find South.","I can identify three other constellations in the night sky.","I have set up and followed a simple compass trail with the support of a local map with a Group of Scouts.","I can teach the importance of the buddy system to Scouts working on Stage 1.","I have put together a personal outdoor Survival kit and can explain why I have included these items.","I can make a personal shelter out of plastic sheeting, rope and other things I have found.","I can demonstrate 5 knots in an activity or camp setting, three of which can be my Stage 2 knots.","I can talk about the ways in which my Patrol worked together while following a compass trail.","I have identified improvements I can make to my shelter next time I try building 1."]],[4,"Stage 4 — Pioneering",["I know how to protect the environment while constructing objects.","I can prepare equipment, when required, for safe transportation to activity location.","I can draw up a plan before constructing an object.","I can read the plan for a pioneering activity and understand what I am required to do.","I can select appropriate size poles and ropes for a construction project.","I can, with a Group of Scouts construct a 5 metre high flagpole on camp.","I can, with a Patrol of Scouts, construct a Scout chariot and challenge another Patrol.","I can construct something fun with my Patrol that we have researched and agreed to construct together.","I can explain the safety precaution to take when undertaking construction projects.","I have used two different types of lashings, which are new to me, in a construction project at this Stage.","I can identify improvements in the way we go about future construction activities, including techniques, safety, teamwork, and outcomes.","I have checked equipment for damage and discussed if it needs to be repaired or replaced."]],[4,"Stage 4 — Survival Skills",["I know how to protect the environment when building shelters and lighting fires.","I can prepare equipment, for safe transportation to activity location.","I can understand the plan for a survival activity and what I am required to plan for.","I can think of five things I would want in my Survival kit.","I am familiar with the signs and symptoms of hypothermia and hyperthermia.","I can signal for help from the ground where the help will come from the air.","I have lit a fire in dry and wet conditions.","I have tried different ways to purify water for drinking and can talk about when it is appropriate to do so.","I have built a shelter big enough for three, made of only natural materials found outdoors and rope, and I have slept out in it for one night.","I can orientate a map to the surrounding landscape with and without a compass.","I can estimate distance travelled while on a Scouting activity without electronic means.","I have discussed the basic survival skills and why each one is important.","I can identify where I can improve my survival skills for next time I try a survival challenge.","I have checked equipment for damage and discussed if it needs to be repaired or replaced."]],[5,"Stage 5 — Pioneering",["I have considered risks involved in pioneering activities and have put together a risk assessment with the support from others.","I have helped design 3 construction projects for camp, taken into consideration safety of self and others at this Stage.","I know how to use a camp axe or Bose or safely (opening, closing, passing, cleaning, caring for, sharpening, cutting) and know how to store them safely.","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider.","I can help construct a camp kitchen including a camp oven and basin.","Using spars [poles] and rope, I have constructed a 3 metre high tower or a bridge over a three metre span in conjunction with safe workplace practices.","I have taken part in at least 5 construction projects by the end of Stage 5.","I have built a structure that doesn't need ropes to construct.","I have prepared a short presentation for my Section Council on the pioneering projects I have been involved in so far.","I have thought about other skills I would like to learn in pioneering.","I can talk to others about what has gone well and what could be done better on future pioneering projects."]],[5,"Stage 5 — Survival Skills",["I have planned a meal for a survival camp taking into consideration limited access to cooking resources.","I can identify five types of cloud, what those cloud types mean and weather patterns.","I can identify ways to protect myself from being seen, heard or smelt by fauna.","I have helped a Scout in a lower Stage put together a Survival Kit and explain to them the use of each item.","I know how to gain permits or permission to gain access to locations when required.","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider.","I have picked a survival base skill that I would like to learn and have developed skills in this area. - Consider something you haven't learned yet to do with fire, water, shelter, food or camouflage.","I have used 3 different ways to purify water for drinking, and I know the limitations, advantages and disadvantages of each method.","I can make a prediction about the local weather through natural signs.","I can identify three native plants that can support me either medically or nutritionally.","I can determine my location without electronic means by refreshing my navigational skills from Stages 1-4. - Consider using a fix or cross-section using back bearings.","I have refreshed my survival shelter skills and assist in the planning of a survivor style camp for a minimum of one night focusing on the basic survival skills.","I have prepared a short presentation for my Section Council on the survival challenges I have participated in, and the skills I have developed.","I have thought about other survival skills I would like to learn.","I can talk to others about what has gone well and what could be done better on future survival challenges."]]],"Bushwalking":[[1,"Stage 1 — Introductory Skills",["I can help pack a backpack for a day walk. Consider what is needed. Consider the best way of packing it.","I can dress myself for the walk. Consider the best types of clothes for bushwalking. Consider if I will be comfortable in different weather conditions.","I can list what food to bring on a day bushwalk. Consider what would be good for me and give me energy. Consider what is nutritious and can be lightweight.","I know why it is important to stick to trails when outdoors. Consider why the trail is there.","I know why to stop when I get lost in the Bush.","I can put together a small personal First Aid kit for our bushwalk. Consider blisters, dehydration and small wounds that may be encountered along the way.","I can explain the 'Buddy' system.","I can identify the four main cardinal points of the compass.","I can identify the main parts of the compass.","I have attended at least one bushwalk of at least one hour's duration at this Stage.","I can demonstrate behaving safely while bushwalking. Consider the environment, people, and equipment.","I can talk about what I enjoyed or learnt from going on a Bush walk."]],[2,"Stage 2 — Basic Walking Skills",["I can explain what clothing I should wear whilst bushwalking. Consider different types of fabric. Consider different types of environments.","I have explained what impact I can have on local vegetation when bushwalking.","I have discussed the appropriate action I should take in the case of an accident or emergency. Consider DRSABCD. Consider emergency services. Consider other small accidents that may happen while bushwalking.","I can discuss what safety precautions I should take before going out for a Bush walk. Consider contacting authorities an informing others. Consider packing the equipment you should carry to keep the Group safe.","I know when and how to contact the emergency services in an emergency.","I can draw or list all of the essential equipment to bring on a bushwalk.","I can use a compass to find basic directions. Try a simple navigational task around your local hall or park. Try taking a bearing and consider magnetic variation.","I can protect myself when exposed to the sun while outdoors.","I have attended at least two short Bush walks at this Stage.","Before I start bushwalking, I can show where and when I'm allowed to go. Consider the map and the rest of the Group.","I have Bush walked a total distance of at least 10 kilometres.","I have talked about what I enjoyed, learned, or improved upon from at least 2 bushwalks","I can suggest what I would do differently on a future bushwalk to enjoy it more, to be safer, to learn new things, or to be more challenging.","I have reviewed my list or picture of essential equipment with my Patrol and Leaders."]],[3,"Stage 3 — Basic Walking Skills",["I can help a Stage 1 Scout to pack their backpack for a bushwalk.","I know how and where to get the latest weather forecast for the area I will be bushwalking in.","I can help plan a balanced menu for bushwalking. Consider nutritional value, variety, and weight.","I can list places where I can and cannot bushwalk.","I can talk about different ways of keeping a Group together while bushwalking.","I have considered bushwalk etiquette when planning for a journey.","I can be responsible for my safety and aware of my surroundings.","I have run a small navigational activity for my fellow Scouts with the support of my leaders.","I can use different types of maps to help me throughout different activities.","I have attended a day walk at this Stage of at least six hours duration. Consider leading a small part of the bushwalk.","I have attended at least two bushwalking activities at this Stage.","I know how to avoid becoming lost, and I know what to do if I get lost.","I know how to treat cuts and minor bleeding.","I can teach the importance of the buddy system and other ways to stay safe to a Scout in Stage 1.","I can identify the features of a tropographical map.","I have given a presentation to my Patrol or my Unit Council about one of the bushwalks I went on during Stage 3.","I have discussed the top five things I have learned throughout Stages 1-3 of bushwalking."]],[4,"Stage 4 — Intermediate",["I can read a trip itinerary for a proposed bushwalk and understand what I am required to plan for and what my role is.","I know how to select equipment and protective clothing, including footwear, according to expected weather conditions.","I always ensure pack weight is appropriate to my body weight and level of fitness. -Consider if the type of equipment, including weather equipment, used in Stage 1 is still the equipment to be used in Stage 4.","I always ensure my equipment weight is distributed throughout my pack so my centre of gravity is balanced while bushwalking.","I am aware of a range of communication devices and can choose appropriate communication equipment for the location I am in.","I can work with others to prepare a menu and food list for a weekend Bush walk.","I can obtain and become familiar with the appropriate map for the intended walk.","I can identify natural navigational aids. - Consider the different natural navigational aids and have a go trying to use some on a bushwalk.","I have throughout the planning Stage become more familiar and confident with taking a bearing including accounting for magnetic variation.","I can apply ascending and descending techniques on slopes. - Consider the different types of techniques and aids available.","I know how to adopt appropriate posture when lifting and carrying a backpack.","I can demonstrate the approach to hazards safely and minimise risks to self and Group where possible.","I have taken part in and logged a 2 day bushwalk at this Stage.","I can identify improvements I can make in planning and leading future bushwalking trips.","I have checked bushwalking equipment for damage and discussed if it needs to be repaired or replaced.","I have discussed with my Patrol and Leaders what my key learnings are from the Bushwalking journey."]],[5,"Stage 5 — Intermediate",["I know how to identify food and water requirements for multiday bushwalks. - Consider food drops and alternate source if possible .","I know how to purify water for drinking.","I can assist Stage 3 Scouts to select appropriate footwear for various Bush walks.","I can minimise damage to the environment while bushwalking.","I can, with the support for my Patrol and Leaders, develop a risk management plan for a two-night Bush walking.","I can identify possible hazards associated with bushwalking and procedures to minimise risks and I know how to take actions to minimise these risks.","I can plan an overnight or weekend bushwalk including selecting an appropriate location using a topographical map and understand Naismith's rule. - Consider all logistical, organisational policy, safety, navigational, environmental, equipment and personal requirements.","I can properly select the clothing required for bushwalking, based on the seasonal requirements such as layering of clothing and protective clothing.","I have with assistance appropriately briefed all members of a bushwalking party and support people about our journey.","I have successfully completed aProvide First Aid (including CPR) course from a recognised provider.","I can find directions without a compass.","I can use a map and compass to find my position on the ground.","I can be an active member of my team while bushwalking.","I can bushwalk rough terrain safely using appropriate gear as required.","I can look after Group safety and morale on a bushwalk.","I can use a minimum of three communication devices to send a message","I have taken part in and logged two bushwalking activities at this Stage at least one of which is a 2 night bushwalk that I have led without leaders attending.","I have given a presentation to our Section Council or Unit on the journey that I have led highlighting the successes the learnings and the areas for improvement.","I can reflect on the journey that I led and what I learnt about myself in the experience."]]],"Camping":[[1,"Stage 1 — Introductory Skills",["I know about the \"Buddy\" system.","I know the boundaries of where I am allowed to go each time I go out camping.","I know to stop when I get lost while camping.","I know the basic elements that you need to make a fire.","I know that I should follow directions from the leader of this activity.","I can help pack a bag for camp.","I can strike a match.","I can help prepare food for cooking at camp.","I have spent two nights at camps and/or Scout sleepovers","I know why it is important to set up camp in an existing campsite.","I can set out my sleeping area at camp.","I can care for my basic personal gear on an overnight camp.","I can talk about what I enjoyed, learnt or improved upon by participating in the camp or sleepover."]],[2,"Stage 2 — Basic Skills",["I can explain what clothing I should wear whilst camping.","I have explained what impact I can have on local vegetation while camping.","I have discussed the appropriate action I should take in the case of an accident.","I can discuss what safety precautions you should take before going camping outdoors.","I know about proper hygiene practises at camp.","I know how to contact the emergency services.","I can draw and label a picture showing all of the essential equipment to bring on a camp.","I know the benefits and risks associated with fire.","I can demonstrate basic safe food handling and the importance of hygiene at camp.","I can protect myself when exposed to the sun while outdoors.","I can behave safely in and around tents and fires at camp.","I can demonstrate and explain why sleeping bags need to be aired out.","I have spent two nights on camp in a tent at this Stage.","I can help set up a tent and identify the main parts of a tent.","I have talked about what I enjoyed, learned, or improved upon from at least two camps.","I can suggest what I would do differently on a future camp to enjoy it more, to be safer, or to learn new things."]],[3,"Stage 3 — Basic Skills",["I can pack my own bag for camp.","I know how and where to get the latest weather forecast for the area I will be camping in.","I can help plan a balanced meal for camp.","I know the benefits of using gas to cook and can talk about what risks to watch out for in regards to using gas.","I can list Group equipment required for camp.","I know how to maintain personal hygiene while camping.","I can assemble a personal First Aid kit for a camp.","I know what DRSABCD stand for and how to use it in First Aid situations.","I can demonstrate keeping myself safe from natural and man made things at camp. Consider feet care, suncare, burns, falls, splinters, etc.","I can help build a campfire and collect materials to do so.","I can cook a meal on a campfire with assistance.","I have used a gas cooker to help cook a camp meal.","I can help run an activity at camp.","I can set up a tent, without help from an adult.","I have spent five nights on a camp in a tent by the end of this Stage.","I know how to treat cuts and minor bleeding.","I can teach the importance of the buddy system to a Stage 1 Scout.","I can demonstrate how to store food at camp.","I have learnt 3 knots that can help me during a standing camp.","I have discussed the ways I can improve the camping activity that I assisted in.","I have discussed my camping and how improvements can be made."]],[4,"Stage 4 — Intermediate",["I can prepare equipment where required, for safe transportation to an activity location.","I can identify appropriate campsites.","I know how to select equipment and protective clothing according to expected weather conditions.","I can work with others to prepare a menu and food list for a weekend camp.","I know about proper hygiene practises at camp and can discuss these with a Stages Two Scout.","I can plan an activity for a camp that I will go on at this Stages.","I can read an itinerary for a proposed camp and understand what I am required to do.","I am familiar with the signs and symptoms of hypothermia and hyperthermia.","I can implement safe sanitary practises at camp to avoid illness and environmental impacts.","I have assisted to pitch a bell tent, canvas troop tent or similar.","I have participated in five nights of camping at this Stage, three of which are consecutive.","I can demonstrate and assist Stage Two Scouts in setting up a tent.","I can help organise a campsite setup and pack down.","I can cook a meal at camp without assistance.","I can safely light an extinguish a campfire.","I can demonstrate the correct care and maintenance of Group gear during and between camps.","I know how to dry and store a tent.","I can identify improvements that could be made for future camping trips I participate in or lead.","I have checked equipment for damage and discussed if it needs to be repaired or replaced."]],[5,"Stage 5 — Intermediate",["I can select camp sites that minimise damage to the environment.","I can identify possible hazards associated with camping and procedures to minimise risks and I know how to take actions to minimise these risks.","I can plan suitable access to water, appropriate to the size of the Group and location.","I know where to source information about camping equipment selection.","I know how to plan for activities in all weather conditions.","I can show the personal gear needed for an overnight lightweight camp.","I can plan a camping trip in accordance with organisational policies.","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider.","I can teach another Scout what to pack for camp.","I can demonstrate the appropriate measures for minimising and dealing with food waste, solid waste and human waste to protect the environment while camping.","I can demonstrate the best layout for a campsite and explain my reasoning including the type of ground, the position of trees, proximity to water, local fauna, shade and shelter.","I can cook a three course meal using a camp oven, portable hike stove or open fire.","I can demonstrate how to repair minor damages to tents.","I have participated in two nights of lightweight camping.","I have spent 16 nights away camping by the end of Stage Five.","I have completed Stage five in the three core outdoor adventure skills.","I have identified improvements that could be made to the three-course meal for next time I prepare a menu and cook on camp"]]],"Alpine":[[1,"Stage 1",["I can help pack a bag for a snow trip.","I know how to dress when I go on a snow trip.","I can explain the buddy system.","I know the importance of staying on the trail whilst at the snow.","I know why to stop when I get lost in the snow.","I know how to contact the emergency services.","I have built something out of snow.","I know how to stay dry or change to dry clothes when I am on a snow trip.","I follow the instructions of the activity leader when at a snow trip","I have been tobogganing","I can take care of my equipment for the duration of a day trip to the snow.","I can talk about what I enjoyed by participating in a snow trip."]],[2,"Stage 2",["I can explain what impact I can have a little vegetation when snow hiking or tobogganing overexposed shrubs.","I can discuss the appropriate action I should take in the case of an accident.","I can discuss what safety precautions I should take before going out in the snow.","I can label a picture describing all of the essential equipment to bring to the snow.","I have walked for one kilometre in the snow.","I can protect myself when exposed to the elements associated with snow while outdoors.","Before I start my snow activity, I can show where and when I'm allowed to go.","I have tried two different snow activities at this Stage.","When I come inside, I can put away my outdoor clothing so it will dry quickly.","I have talked about what I enjoyed, learned, or improved upon from at least 2 snow activities.","I can suggest what could be done differently on a future snow hike or activity, to enjoy it more, to be safer, or to learn new things."]],[3,"Stage 3",["I can pack for a day pack for a snow trip.","I know how and where to get the different weather forecasts for the area I will be in for my snow activity.","I know and can explain the effect of weather on Alpine activities.","I understand layering principle when dressing for snow activities.","I can plan a balanced meal for activities on the snow.","I have learned 8 main points of the compass.","I know what DRSABCD stands for and how to use it in First Aid situations","I am familiar with signs and symptoms of hypothermia and hyperthermia.","I have ed."]],[4,"Stage 4 — Downhill Skiing",["I can list conditions that make skiing more hazardous or difficult.","I can read a planned Group itinerary for a proposed skiing trip and understand what I am required to do.","I can identify various Alpine signs and their meaning.","I can select suitable clothing and equipment and check that it is in good working order.","I can identify and plan food and water requirements according to principles of nutrition and the conditions of the activity.","I have taught a Stage 2 Scout or below how to dress for the Alpine environment.","I can fit equipment, according to the manufacturer's specification, to ensure comfort and safety.","I can safely fall over when unable to stop.","I can demonstrate a degree of balance, movement, and confidence on beginner terrain, (green runs)","I can control my speed using a snow plough.","I can safely ride a chair lift and other methods of snow transportation.","I can link turns using a snowplough.","I can demonstrate a safe approach to hazards and minimise risks to myself and the Group where possible.","I have taken part in at least two days of downhill skiing at this Stage.","I can identify where I have begun to improve with my downhill skiing skills and where I would like to further improve.","I have checked equipment for damage and discussed if it needs to be repaired or replaced."]],[4,"Stage 4 — Snowboarding",["I can list conditions that make snowboarding more hazardous or difficult.","I can read a planned Group itinerary for a proposed snowboarding trip and understand what I am required to do.","I can identify various Alpine signs and their meaning.","I can select suitable clothing and equipment and check that it is in good working order.","I can identify and plan food and water requirements according to principles of nutrition and the conditions of the activity.","I have taught a Stage 2 Scout or below how to dress for the Alpine environment.","I can fit equipment according to manufacturers sp  should take in the case of an accident.","I know how to contact the emergency services.","I have talked about what I enjoy, learnt, or improved upon from at least two bike riding journeys.","I can suggest what could be done differently on a future bike riding journey, to enjoy it more, to be safer, or to learn new things."]],[3,"Stage 3",["I can explain the importance of having the right clothing and gear while riding.","I know which items I should carry with me when riding.","I know how and where to get the latest weather forecast for the area I will be riding in.","I know that I should follow the instructions of the person in charge of the group.","I know what DRSABCD stands for and how to use it in First Aid situations.","I can show you how to test a bike before riding (ABCDQ) test.","I have assembled an in-field repair kit and have taken it on a ride.","I have assisted in repairing a puncture.","I have taken part in a day ride as part of a group.","I can maintain safety while riding in a group on parts, trails or roads.","I know what the legal requirements are for riding in my area.","I have discussed with my Patrol different ways to improve safety for our next bike ride journey.","I have reviewed with my patrol the items included in our in-field repair kit."]],[4,"Stage 4 — Introductory",["I can discuss equipment that I will need on a day ride and how conditions may affect my selection.","I can prepare equipment where required, for safe transportation to an activity location.","I can plan appropriate food and water requirements for my cycling trip.","I know how to select equipment and protective clothing according to expected weather conditions.","I know how to identify bike parts requiring lubrication.","I can conduct routine bike maintenance cheques and repairs.","I can identify possible hazards associated with cycling on a road and procedures to minimise risks and I can take actions to minimise these risks.","I have planned a route for a cycle trip.","I have adjusted my bike to ensure an appropriate riding posture.","I am familiar with the signs and symptoms of hypothermia and hyperthermia.","I know how to adopt appropriate posture and balance when riding.","I can ride in a group safely.","I have demonstrated methods to communicate with motorists and other cyclists.","I can apply smooth and timely gear changes across different terrain features.","I have cleaned my bike and helmet after a cycling trip.","I have taken part in and logged at least five cycling activities (including one full day trip at this Stage).","I can repair a puncture on my bike without assistance.","I can identify where I have begun to improve my cycling skills and where I would like to further improve.","I know how to clean and maintain my bike after a bike ride journey."]],[4,"Stage 4 — Introductory Mountain Biking",["I can prepare equipment, where required, for safe transportation to an activity location.","I can discuss equipment that I will need on a day ride and how conditions may affect my selection.","I know how to select equipment and protective clothing according to expected weather conditions and terrain.","I can plan appropriate food and water requirements for my mountain biking trip.","I know how to identify bike parts requiring lubrication.","I can conduct routine bike maintenance cheques and repairs.","I can identify possible hazards associated with mountain biking and procedures to minimise risks and I know how to take actions to minimise these risks.","I have planned a route for a mountain biking trip.","I have adjusted my bike to ensure an appropriate riding posture.","I am familiar with the signs and symptoms of hypothermia and hyperthermia.","I know how to adopt appropriate posture and balance when riding.","I can see approaching obstacles and can negotiate them in a safe and controlled manner.","I have demonstrated methods to communicate with other mountain bikers.","I have taken part in three activities on off road trails.","I know how to navigate using maps and trail guide resources.","I can ride in a group safely.","I can apply smooth and timely gear changes across different terrain features.","I have cleaned my bike and helmet after a cycling trip.","I can repair a puncture on my bike without assistance.","I can identify where I have begun to improve my mountain biking skills and where I would like to further improve.","I know how to clean and maintain my bike after a bike riding journey."]],[5,"Stage 5 — Introductory",["I know how to choose a bike appropriate for my needs.","I can select routes that minimise damage to the environment.","I can consider requirements for carrying equipment on my bike for an overnight trip.","I can identify cycling tools and spare parts.","I can apply lubrication when required.","I know how to adjust tyre pressure according to the terrain.","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider.","I have demonstrated recommend braking techniques for sealed and off road conditions.","I have adjusted my position and body weight to assist in my handling.","I can replace a cable.","I can fix a broken chain.","I know how to take measures to guard personal and group safety.","I have undertaken at least five days of cycling by the end of Stage 5.","I have participated in an overnight cycling trip (that could be supported) at this Stage.","I can demonstrate a comfortable cadence for the terrain encountered.","I have given a presentation about one bike riding journey to my unit."]],[5,"Stage 5 — Introductory Mountain Biking",["I know where two sources of information about bike selection can be gained and have looked into bike selection.","I know how to identify food and water requirements for a day of mountain biking.","I can select routes that minimise damage to the environment.","I know how to clean a bike to prevent damage.","I can identify mountain biking tools and spare parts.","I can apply lubrication when required.","I know how to adjust tyre pressure according to the terrain.","I have assisted in planning a mountain biking trip.","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider.","I can apply smooth and timely gear changes and component lockouts across different terrain features.","I have demonstrated recommended braking techniques for downhill and cross country conditions.","I can adopt a comfortable cadence for the terrain encountered.","I know how to navigate trails and apply efficient cornering techniques.","I have undertaken at least five days of mountain biking by the end of Stage 5.","I can replace a cable.","I can fix a broken chain.","I have spent a day exploring a mountain bike trail hub.","I have adjusted my body weight and pedal position to assist in my handling across various terrain.","I have given a presentation about one mountain bike riding journey to my unit."]]],"Vertical":[[1,"Stage 1 — Introductory Skills",["I know what the best types of clothes for a rock activity are and can dress myself for an activity.","I know not to break or damage trees when climbing them.","I know what to do if I get lost at an activity.","I can explain the buddy system.","I have discussed what the purpose of a helmet is.","I know the safety rules for climbing on rocks, trees, fences and man-made structures.","I have been to a rock playground and know how to play safely and cooperatively with others.","I can take care of my personal equipment for the duration of a rock activity.","I know how to wear and adjust a helmet.","I know how to contact the emergency services.","I can talk about what I enjoyed, learned, or improved upon by participating in a rock-based activity."]],[2,"Stage 2 — Basic Skills",["I can discuss what safety precautions you should take before going on a rock activity.","I can put on my own helmet and harness properly.","I have explained what impact I can have on local visitation when participating in rock  have checked equipment for damage and discussed if it needs to be repaired or replaced."]],[4,"Stage 4 — Introductory Canyoning",["I know what makes a safe and unsafe Canyon activity.","I can prepare equipment, where required, for safe transportation to an activity location.","I can read an itinerary for a proposed canyoning trip and understand what I am required to do or take and why.","I know why and where I should wear a helmet for Canyon activities.","I have completed all necessary personnel and equipment safety cheques prior to commencing a canyoning activity (ABCDE check with Buddy.)","I can prepare a belay for a proposed canyoning activity.","I know how to care for, handle and store a canyoning rope harness and helmet.","I have discussed different setup techniques for canyons.","I know how weather systems can impact canyoning activities and have discussed options to evacuate when necessary.","I am familiar with the signs and symptoms of hypothermia and hyperthermia.","I know how wet conditions can affect my safety when canyoning.","I know the communication calls and scripts to follow whilst canyoning.","I have taken part in and logged a minimum of two canyoning activities at this Stage one of which is horizontal and one vertical.","I can demonstrate canyoning techniques within a variety of terrain obstacles such as liloing, swimming and wading through rock pools.","I can thread a descending device to the abseil line and clip onto the line safely.","I can demonstrate the correct posture and technique while abseiling using a double rope and in a slippery Canyon.","I can bottom belay or keep an eye on another person while they are abseiling if they are on a self-belay.","I have revisited my knotting skills and can tie an Vertical butterfly, re threaded figure-of-eight, double fisherman's knot, tape knot and a Pursik knot and I can apply them to canyoning activity situations.","I can identify improvements for future canyoning activities.","I have checked equipment for damage and discussed if it needs to be repaired or replaced."]],[4,"Stage 4 — Introductory Caving",["I know what makes a safe and unsafe caving activity site.","I can prepare equipment, where required, for safe transportation to an activity location.","I can read an itinerary for a proposed caving trip and understand what I am required to do.","I know why and where I should wear a helmet for vertical activities.","I have completed all necessary personnel and equipment safety checks prior to commencing caving activity. (ABCDE checks.)","I can prepare belay device for proposed caving activities.","I know how to care for, handle and store caving rope, harness and helmet and other equipment.","I have discussed different setup techniques for caving activities.","I am familiar with the signs and symptoms of hypothermia and hyperthermia.","I know what to do when I become lost in a cave.","I know how wet and dusty conditions can affect my safety when caving.","I know the communication calls and scripts to follow whilst caving.","I have taken part in and logged two caving journeys at this Stage.","I can move efficiently through a cave and negotiate hazards and features.","I have revisited my knotting skills and can tie an Vertical butterfly, re threaded figure-of-eight, double fisherman's knot, tape knot and a Pursik knot and I can apply them to caving activity situations.","I can identify improvements for future caving activities.","I have checked equipment for damage and discussed if it needs to be repaired or replaced."]],[4,"Stage 4 — Introductory Climbing",["I know what makes a safe and unsafe climbing activity site.","I can prepare equipment, where required, for safe transportation to a climbing location.","I can read an itinerary for a proposed climbing trip and understand what I am required to do.","I know why and where I should wear a helmet for climbing activities.","I have completed all necessary personnel and equipment safety check prior to commencing a cl ilst canyoning","I have conducted an evaluation of the relevant aspects of the canyon activity.","I can list four places to find information to assist with planning a Canyon activity and what sort of information to look for.","I have demonstrated the correct method of a belay within a Canyon.","I can demonstrate a safe way of doing the following skills in deep rock pools: swimming, wading and liloing","I know how to remain safe around open holes and water in a canyoning system.","I have undertaken at least five days of canyoning by the end of Stage 5 with a minimum of seven canyons completed, across at least four different canyons locations.","I can demonstrate basic chimneying","I have assisted in setting up canyon abseils as single pitch locations.","I can safely escape a belay while keeping the abseiler safe.","I know how to pack up rope correctly in a Canyon environment.","I have given a presentation on a canyoning expedition I have completed to my Unit."]],[5,"Stage 5 — Introductory Caving",["I know how to identify food and water requirements for day trips.","I can select routes that minimise damage to the environment.","I can identify possible hazards associated with caving activities and procedures to minimise risks and I know how to take actions to minimise these risks.","I know where to gain information about caving equipment selection.","I know the dangers associated with foul air in caves. (Carbon Dioxide and Methane.)","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider.","I can explain the precautions to take in a wet cave and how to respond to flooding","I know how to identify foul air in a cave.","I can demonstrate the standard communication conventions used in caving.","I have undertaken at least five days of caving by the end of Stage 5.","I can demonstrate basic chimneying","I can adjust and fit equipment to ensure personal comfort and safety.","I always demonstrate appropriate techniques to minimise otential improvements."]],[5,"Stage 5 — Lifesaving",["I know how to deal with an incident injury or illness in an outdoor location and how to summon help.","I can demonstrate to a group of Scouts how to safely remove an unconscious person from a body of water.","I can identify possible hazards associated with surfing or swimming in the ocean, lake or river (wherever is applicable to you) and procedures to minimise risks.","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider","I can swim 300 metres continuously using correct techniques: 100 M freestyle 50m backstroke 50m breaststroke 50m side stroke 50m survival backstroke.","I can perform a rescue using a long object throwing a flotation object and weighted rope over a distance of 10 metres within a time limit of one minute.","I can fit a PFD correctly while treading water swim 100 metres using survival strokes demonstrate HELP (heat escape lessening posture) technique and climb out of the water whilst wearing the PFD.","I have completed a mock incident report.","I can review my own incident response performance and identify potential improvements."]],[5,"Stage 5 — Surfing",["I know how to identify food and water requirements for a surfing session.","I can select beach access routes that minimise damage to the environment.","I can identify possible hazards associated with surfing and procedures to minimise risks.","I know where sources of information about surfing equipment selection can be gained.","I can help choose a suitable surfing destination.","I can outline safety procedures and safe areas and/or boundaries for the surfing session.","I understand how to deal with marine creatures if I interact with them.","I have successfully completed a Provide First Aid (including CPR) course from a recognised provider","I can demonstrate monitoring basic manoeuvres and surfing techniques to ensure the safety of myself and other participants.","I can catch broken waves demons const AREAS=['Community','Creative','Outdoors','Personal Growth'];
const SPICES=['Social','Physical','Intellectual','Character','Emotional','Spiritual'];
function dutyPatrol(){
  const f=curItemR();if(!f.it||f.it.kind!=='week'||f.t<0)return'';
  const pats=[...new Set(S.roster.map(s=>(s.patrol||'').trim()).filter(Boolean))].sort();
  if(!pats.length)return'';
  let wn=0;for(const x of S.year.terms[f.t].items){if(x.kind==='week')wn++;if(x.id===f.it.id)break;}
  return pats[(wn-1)%pats.length];}
function roleNames(it,r){if(!it||!it.roles)return'';
  return S.roster.filter(s=>it.roles[s.id]===r).map(s=>s.name.split(' ')[0]).join(', ');}
function upcomingEvents(){
  const today=todayISO();const out=[];
  S.year.terms.forEach(tm=>tm.items.forEach(it=>{if(it.kind==='event'&&it.date&&it.date>=today)out.push(it);}));
  (S.year.events||[]).forEach(it=>{if(it.date&&it.date>=today)out.push(it);});
  out.sort((a,b)=>a.date<b.date?-1:1);
  return out.slice(0,3).map(it=>(it.activity||it.type)+' — '+fmtD(it.date)).join('  ·  ');}
function nextWeekInfo(){
  const f=curItemR();let nxt=null;

    for(let j=i+1;j<items.length;j++){if(items[j].kind==='week'){nxt=items[j];break;}}}
  if(!nxt)return 'end of term — next term takes over';
  const L=roleNames(nxt,'L'),A=roleNames(nxt,'A');

function peakMountain(s){

  let climbAt=-1;ps.forEach((v,i)=>{if(v)climbAt=i;});
  // path threaded through the nodes with a gentle zigzag
  const bow=3; // gentle curve; anchor points already carry the switchback
  let path='M'+MTN_PTS[0][0]+','+MTN_PTS[0][1];
  for(let i=1;i<MTN_PTS.length;i++){const a=MTN_PTS[i-1],b=MTN_PTS[i];
    path+=' Q'+((a[0]+b[0])/2+(i%2?bow:-bow))+','+((a[1]+b[1])/2)+' '+b[0]+','+b[1];}
  // lit portion of the path = up to the highest completed node
  let litPath='';

    for(let i=1;i<=climbAt;i++){const a=MTN_PTS[i-1],b=MTN_PTS[i];
      litPath+=' Q'+((a[0]+b[0])/2+(i%2?bow:-bow))+','+((a[1]+b[1])/2)+' '+b[0]+','+b[1];}}

    const glyph=done?'✓':(auto?'🔒':(i+1));

  const cp=climbAt<0?[MTN_PTS[0][0],MTN_PTS[0][1]+16]:[MTN_PTS[climbAt][0],MTN_PTS[climbAt][1]-15];

    <path d="M${summit[0]},${summit[1]-22} L${summit[0]+13},${summit[1]-18} L${summit[0]},${summit[1]-14} Z" fill="var(--amber)"/></g>`:'';
  return `<div class="mtn"><img src="./mountain.jpg" alt="" class="mtn-bg" loading="lazy">
    <svg class="mtn-svg" viewBox="0 0 300 200" preserveAspectRatio="xMidYMid slice">
      <path d="${path}" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="2.2" stroke-dasharray="4 5" stroke-linecap="round"/>
      ${litPath?`<path d="${litPath}" fill="none" stroke="#FFD98A" stroke-width="2.6" stroke-linecap="round" filter="url(#mglow)"/>`:''}

function oasFor(sid){

      {method:'PATCH',headers:{'Content-Type':'application/json'},body});
  }else{

    const r=await dFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id',
      {method:'POST',headers:{'Content-Type':'multipart/related; boundary='+b},body:mp});

function applyRemote(env){
  const d=env.data||{};
  if(d.roster)S.roster=d.roster;
  if(d.year)S.year=migrateYear(d.year,null);
  if(d.nights)S.nights=d.nights;
  if(d.welcome)S.welcome=d.welcome;
  if(d.contacts)S.contacts=d.contacts;
  rosterDefaults();
  SYNC_KEYS.forEach(k=>Store.set('muster.'+k,JSON.stringify(S[k])));
  S.meta.updatedAt=env.updatedAt||Date.now();
  Store.set('muster.meta',JSON.stringify(S.meta));
  if(S.year.cur&&!planFind(S.year.cur.id).it)S.year.cur=null;
  if(!S.night.saved&&S.night.step===1){applyCurrent(S.night);save('night');}
}
let _syncBusy=false;
async function driveSync(mode){
  if(!S.drive.enabled||_syncBusy)return;_syncBusy=true;try{await _driveSyncInner(mode);}finally{_syncBusy=false;}}
async function _driveSyncInner(mode){
  if(!S.drive.enabled)return;
  if(!tokenValid()){
    if(mode==='manual')driveConnect();
    else{S.drive.status='Link down — tap Sync to reconnect';renderDriveStatus();}
    return;}
  S.drive.status='Syncing…';renderDriveStatus();
  try{
    const id=await driveFindFile();
    if(!id){await drivePush();}
    else{
      const r=await dFetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media');
      let env=null;try{env=JSON.parse(await r.text());}catch(e){}
      if(!env||!env.data){await drivePush();}
      else if((env.updatedAt||0)>S.meta.updatedAt){applyRemote(env);render();}
      else if(S.meta.updatedAt>(env.updatedAt||0)){await drivePush();}
    }
    S.drive.lastSync=Date.now();S.drive.status='';saveDrive();renderDriveStatus();
  }catch(e){
    S.drive.status=(e.message==='auth')?'Link down — tap Sync to reconnect':'Sync hit a snag — try again';
    saveDrive();renderDriveStatus();
  }
}
function queuePush(){
  if(!S.drive||!S.drive.enabled||!tokenValid())return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(()=>driveSync('auto'),1500);
}
function driveAgo(){
  if(!S.drive.lastSync)return'';
  const m=Math.round((Date.now()-S.drive.lastSync)/60000);
  return m<1?'just now':(m<60?m+' min ago':Math.round(m/60)+' hr ago');
}
function renderDriveStatus(){
  const el=document.getElementById('dstatus');
  if(el)el.textContent=driveStatusText();
}
function driveStatusText(){
  if(S.drive.status)return S.drive.status;
  if(!S.drive.clientId)return'Not set up yet';
  if(!S.drive.enabled)return'Ready to connect';
  if(!tokenValid())return'Link idle — will reconnect on Sync'+(S.drive.lastSync?' · last sync '+driveAgo():'');
  return'Link established'+(S.drive.lastSync?' · last sync '+driveAgo():'');
}
function driveBoot(){
  if(_authPending){S.drive.tok=_authPending;S.drive.enabled=true;_authPending=null;saveDrive();render();}
  if(S.drive.enabled&&tokenValid())driveSync('auto');
  // hands-free sync: push straight away when you leave, pull when you come back
  const kick=()=>{if(S.drive&&S.drive.enabled&&tokenValid()){clearTimeout(_pushTimer);driveSync('auto');}};
  document.addEventListener('visibilitychange',kick);
  window.addEventListener('pagehide',kick);
  window.addEventListener('focus',kick);
}
