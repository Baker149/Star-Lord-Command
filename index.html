function progressFor(id){
  const p={Community:0,Creative:0,Outdoors:0,'Personal Growth':0,A:0,L:0};
  S.nights.forEach(n=>{
    if(n.present&&!n.present.includes(id))return;
    const c=n.credits[id];if(!c)return;
    const t=typeof c==='string'?c:c.t;
    if(t==='P'){let a=typeof c==='object'?c.a:null;
      if(!a||p[a]==null)a=(n.areas&&n.areas[0])||n.area;
      if(p[a]!=null)p[a]++;}
    else if(t==='A')p.A++;else if(t==='L')p.L++;});
  return p;
}
/* Milestone roll-up (Tracey: "milestones restart each time").
   Total everything a scout has earned = opening balance (what they arrived with,
   banked in their current milestone) + all nights since. Then pour that pool
   into milestones in order: fill M1's targets, overflow spills into M2, then M3.
   Overflow rolls over automatically. */
function emptyMS(){return {Community:0,Creative:0,Outdoors:0,'Personal Growth':0,A:0,L:0};}
// Total earned pool = raw night counts + the scout's opening balance.
// Opening balance for milestones *below* the arrival milestone is assumed complete,
// so we pre-credit those milestones' full targets; the current milestone gets its
// entered per-area/assist/lead counts.
function msPool(id){
  const s=S.roster.find(x=>x.id===id);const raw=progressFor(id);
  const pool=emptyMS();
  for(const k in pool)pool[k]=raw[k]||0;
  if(s){
    const arr=s.milestone||1;
    // milestones already complete on arrival: credit their full targets
    for(let m=1;m<arr;m++){const tg=MS[m];
      AREAS.forEach(a=>pool[a]+=tg.P);pool.A+=tg.A;pool.L+=tg.L;}
    // partial progress banked in the arrival milestone
    const ob=(s.msOpening&&s.msOpening[arr])||emptyMS();
    for(const k in pool)pool[k]+=(ob[k]||0);
  }
  return pool;
}
// Distribute the pool across milestones. Returns per-milestone filled counts,
// which milestone is current, and that milestone's progress toward target.
function msRollup(id){
  const pool=msPool(id);
  const fills=[emptyMS(),emptyMS(),emptyMS()];
  const rem={...pool};
  let done=[false,false,false];
  for(let m=1;m<=3;m++){const tg=MS[m],f=fills[m-1];
    AREAS.forEach(a=>{const take=Math.min(rem[a],tg.P);f[a]=take;rem[a]-=take;});
    f.A=Math.min(rem.A,tg.A);rem.A-=f.A;
    f.L=Math.min(rem.L,tg.L);rem.L-=f.L;
    done[m-1]=AREAS.every(a=>f[a]>=tg.P)&&f.A>=tg.A&&f.L>=tg.L;}
  // current milestone = first not-yet-complete (or 3 if all done)
  let cur=done[0]?(done[1]?(done[2]?3:3):2):1;
  if(!done[0])cur=1;else if(!done[1])cur=2;else cur=3;
  return {fills,done,cur,progress:fills[cur-1]};
}
// Current-milestone progress (what the Youth card shows), reset per milestone.
function msProgress(id){return msRollup(id).progress;}
// Derived current milestone from actual progress (roll-up decides, not a stored field).
function msCurrent(id){return msRollup(id).cur;}
function kmTotal(id){let t=0;S.nights.forEach(n=>{if(n.kmLog&&n.kmLog[id])t+=+n.kmLog[id]||0;});
  const s=S.roster.find(x=>x.id===id);return t+(s?+s.priorKm||0:0);}
function nightsTotal(id){let t=0;S.nights.forEach(n=>{if(n.nightsLog&&n.nightsLog[id])t+=+n.nightsLog[id]||0;});
  const s=S.roster.find(x=>x.id===id);return t+(s?+s.priorNights||0:0);}

function summaryText(n){
  const nm=id=>{const s=S.roster.find(x=>x.id===id);return s?s.name:'?';};
  const byT={P:{},A:{},L:{}};
  n.present.forEach(id=>{
    const c=n.credits[id];if(!c)return;
    const t=typeof c==='string'?c:c.t;if(!byT[t])return;
    let a=(typeof c==='object'&&c.a)||(n.areas&&n.areas[0])||'—';
    (byT[t][a]=byT[t][a]||[]).push(nm(id));});
  const attended=n.present.filter(id=>!n.credits[id]).map(nm);
  const block=o=>{const ks=Object.keys(o);
    return ks.length?ks.map(a=>'    '+a+':  '+o[a].join(', ')).join('\n'):'    (none)';};
  let oas;
  if(n.targetSkills&&n.targetSkills.length){
    const byStream={};
    n.targetSkills.forEach(sk=>{const st=sk.id.split('|')[0];(byStream[st]=byStream[st]||[]).push(sk);});

        const got=n.present.filter(id=>n.skillsDone[id]&&n.skillsDone[id][sk.id]).map(nm);
        const tag=sk.stage?'[S'+sk.stage+'] ':'';
        return '  '+tag+sk.name+'\n     -> '+(got.length?got.join(', '):'(none)');}).join('\n');
      return (Object.keys(byStream).length>1?'  ['+st+' sheet]\n':'')+lines;}).join('\n\n');

  if(n.logKm){const ks=n.present.filter(id=>n.kmLog[id]).map(id=>'  '+nm(id)+':  '+n.kmLog[id]+' km');
    extra+='\n\n> WALKABOUT AWARD  —  km this activity\n'+(ks.length?ks.join('\n'):'  (none entered)');}
  if(n.logNights){const ns=n.present.filter(id=>n.nightsLog[id]).map(id=>'  '+nm(id)+':  '+n.nightsLog[id]+' nights');
    extra+='\n\n> CAMPER AWARD  —  nights under canvas\n'+(ns.length?ns.join('\n'):'  (none entered)');}

${fmtD(n.date)} ${n.date.slice(0,4)}  ·  ${n.weekLabel||'unscheduled'}
Activity:  ${n.activity}
Challenge areas:  ${(n.areas||[]).join(', ')||'—'}

> OAS WORKBOOK${(()=>{const ss=[...new Set((n.targetSkills||[]).map(s=>s.id.split('|')[0]))];
  return ss.length===1?'  —  '+ss[0]+' sheet':(ss.length===0&&n.stream?'  —  '+n.stream+' sheet':'');})()}
Tick Y for each skill, only for the scouts listed:
${oas}

> MILESTONES WORKBOOK  —  Milestone sheets
Use activity "${n.activity}" + date ${fmtD(n.date)} in each cell.
  Participate:
${block(byT.P)}
  Assist:
${block(byT.A)}
  Lead:
${block(byT.L)}

Attended only — no milestone credit:
  ${attended.length?attended.join(', '):'(none)'}${extra}

Approved (unit council):  ${n.plBy||'—'}
Signed off by (leader):  ${n.signedBy}`;
}

function ensurePlan(it){if(!it.plan)it.plan={how:'',where:'',equipment:'',game:'',permissions:'',contingency:'',status:''};
  const p=it.plan;
  if(!p.sched)p.sched=[];if(p.meals==null)p.meals='';
  if(p.leadAction==null)p.leadAction='';if(p.assistAction==null)p.assistAction='';
  if(p.aaTeam==null)p.aaTeam='';if(p.aaTeamWhich==null)p.aaTeamWhich='';
  if(p.assist){if(!p.aaTeamWhich){p.aaTeamWhich=p.assist;p.aaTeam='yes';}delete p.assist;}
  if(!p.skillHow)p.skillHow={};
  if(!p.review)p.review={worked:'',change:'',next:''};
  if(p.permNeeded==null)p.permNeeded=(p.permissions||'').trim()?'yes':'';
  return p;}
function planStepsDone(it){
  const p=ensurePlan(it);
  return {
    1:!!(it.targetSkills&&it.targetSkills.length&&it.targetSkills.every(ts=>((p.skillHow||{})[ts.id]||'').trim())),
    2:!!((it.activity||'').trim()&&(p.where||'').trim()&&(p.how||'').trim()),
    3:p.sched.length>0&&p.sched.every(r=>(r.t||'').trim()&&(r.w||'').trim()),
    4:!!((p.leadAction||'').trim()&&(p.assistAction||'').trim()),
    5:!!((p.equipment||'').trim()&&(p.contingency||'').trim()&&p.aaTeam&&p.permNeeded)};}

function termStats(ti){
  const ids=new Set(S.year.terms[ti].items.map(x=>x.id));
  const ns=S.nights.filter(n=>ids.has(n.weekId));
  const st={nights:ns.length,P:0,A:0,L:0,skills:0,sp:{},areas:{Community:0,Creative:0,Outdoors:0,'Personal Growth':0}};
  let ch=0,chN=0;
  ns.forEach(n=>{
    Object.values(n.credits||{}).forEach(c=>{if(st[c.credit]!=null)st[c.credit]++;
      if(c.credit!=='X'&&c.area&&st.areas[c.area]!=null)st.areas[c.area]++;});
    Object.values(n.skillsDone||{}).forEach(arr=>st.skills+=(arr||[]).length);
    if(n.review&&n.review.challenge){ch+=n.review.challenge;chN++;}
    (n.review&&n.review.spices||[]).forEach(sp=>{st.sp[sp]=(st.sp[sp]||0)+1;});});
  st.chal=chN?(ch/chN).toFixed(1):null;
  return st;}

/* ---- RULES ---- */
function badgesFor(s){
  const list=[];
  const md=msDoneCalc(s);
  [1,2,3].forEach(m=>{if(md[m-1])list.push({key:'M'+m,label:'Milestone '+m});});
  const o=oasFor(s.id);
  STREAMS.forEach(st=>{const v=o.streams[st];if(!v)return;
    for(let g=(v.from||0)+1;g<=v.cur;g++)list.push({key:'OAS_'+st+'_'+g,label:st+' Stage '+g});});
  (s.sias||[]).forEach(x=>list.push({key:'SIA_'+x.id,label:'SIA — '+(x.area||'project')}));
  if(s.peak&&peakStepState(s).every(Boolean))list.push({key:'PEAK',label:'Peak Award ★'});
  return list;}

    const earned=badgesFor(s);

    ${cards||'<div class="card"><div class="empty">Nothing earned yet — badges build from signed-off nights.</div></div>'}

      ${S.drive.clientId?`<p class="hint" style="margin-top:7px">Client ID set. <span data-act="dclearid" style="text-decoration:underline;cursor:pointer">Change it</span></p>`:''}
      <div class="mini-cap" style="margin-top:12px">Backup</div>

/* ===== events ===== */
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;
  const a=t.dataset.act,n=S.night;
  if(a==='nav'){S.view=t.dataset.v;render();return;}
  /* tonight */
  if(a==='narea'){const ar=t.dataset.area;
    n.areas.includes(ar)?n.areas=n.areas.filter(x=>x!==ar):n.areas.push(ar);
    save('night');render();return;}
  if(a==='toggle'){n[t.dataset.f]=!n[t.dataset.f];save('night');render();return;}
  if(a==='grouptoggle'){const gi=+t.dataset.g;n.openGroup=(n.openGroup===gi?null:gi);save('night');render();return;}
  if(a==='skilltoggle'){const id=t.dataset.id;
    const ex=n.targetSkills.find(s=>s.id===id);
    if(ex)n.targetSkills=n.targetSkills.filter(s=>s.id!==id);
    else{const p=id.split('|');const grp=OAS_SKILLS[p[0]]&&OAS_SKILLS[p[0]][+p[1]];
      n.targetSkills.push({id,name:skillName(id),stage:grp?grp[0]:null});}
    save('night');render();return;}
  if(a==='delskill'){n.targetSkills=n.targetSkills.filter(s=>s.id!==t.dataset.id);save('night');render();return;}
  if(a==='next'){
    if(n.step===1&&!n.activity.trim()){uiAlert('Give the activity a name first — a credit can only attach to a named activity.');return;}
    n._lockAnim=n.step;
    n.step++;save('night');render();return;}
  if(a==='back'){n.step--;save('night');render();return;}
  if(a==='roll'){const id=t.dataset.id;
    n.present.includes(id)?n.present=n.present.filter(x=>x!==id):n.present.push(id);
    save('night');render();return;}
  if(a==='credit'){const id=t.dataset.id,c=t.dataset.c;
    if(c==='-')delete n.credits[id];
    else if(c==='P'){const ex=n.credits[id];
      const a0=(ex&&typeof ex==='object'&&n.areas.includes(ex.a))?ex.a:(n.areas[0]||'');
      n.credits[id]={t:'P',a:a0};}
    else n.credits[id]={t:c,a:(n.credits[id]&&n.credits[id].a)||n.areas[0]||''};
    save('night');render();return;}
  if(a==='creditarea'){const id=t.dataset.id;
    if(n.credits[id])n.credits[id].a=t.dataset.area;save('night');render();return;}
  if(a==='skilldone'){const id=t.dataset.id,sk=t.dataset.skill;
    n.skillsDone[id]=n.skillsDone[id]||{};
    n.skillsDone[id][sk]?delete n.skillsDone[id][sk]:n.skillsDone[id][sk]=true;
    save('night');render();return;}
  if(a==='signoff'){
    if(!n.activity.trim()||!n.areas.length||!n.signedBy.trim()||!(n.plBy||'').trim())return;
    const it=planFind(n.weekId).it;
    const pick=o=>{const r={};n.present.forEach(id=>{if(o[id]!==undefined)r[id]=o[id];});return r;};
    const rec={id:uid(),date:n.date,weekLabel:it?itemLabel(it):'',desig:desigFor(n),activity:n.activity,review:{...(n.review||{})},
      areas:[...n.areas],stream:n.stream,targetSkills:n.targetSkills.map(s=>({...s})),
      present:[...n.present],credits:JSON.parse(JSON.stringify(pick(n.credits))),
      skillsDone:JSON.parse(JSON.stringify(pick(n.skillsDone))),
      logKm:n.logKm,logNights:n.logNights,kmLog:pick(n.kmLog),nightsLog:pick(n.nightsLog),
      signedBy:n.signedBy,plBy:n.plBy||''};
    S.nights.push(rec);save('nights');
    S.lastNight=rec;S.night=freshNight();S.night.saved=true;save('night');render();return;}
  if(a==='newnight'){S.night=nightFromCurrent();save('night');render();return;}
  if(a==='copy'){const txt=summaryText(S.lastNight);
    if(navigator.clipboard)navigator.clipboard.writeText(txt).then(
      ()=>{t.textContent='Copied ✓';setTimeout(()=>t.textContent='Copy summary',1600);},
      ()=>fb(txt,t));else fb(txt,t);return;}
  if(a==='delnight'){const id=t.dataset.id;uiConfirm('Delete this night record?',()=>{
    S.nights=S.nights.filter(x=>x.id!==id);save('nights');render();});return;}
  /* plan */
  if(a==='planview'){S.year.viewT=+t.dataset.t;save('year');render();return;}
  if(a==='r1open'){const it=planFind(t.dataset.id).it;if(!it)return;
    if(!it.r1)it.r1=r1New(it);save('year');S._r1Id=t.dataset.id;render();return;}
  if(a==='r1back'){S._r1Id=null;render();return;}
  if(a==='r1help'){S._r1Help=!S._r1Help;render();return;}
  if(a==='nchal'){S.night.review.challenge=+t.dataset.v;save('night');render();return;}
  if(a==='runtick'){const r=S.night.run[+t.dataset.i];if(r){r.done=!r.done;save('night');render();}return;}
  if(a==='nspice'){const sp=t.dataset.s,arr=S.night.review.spices;
    const i=arr.indexOf(sp);i>=0?arr.splice(i,1):arr.push(sp);save('night');render();return;}
  if(a==='ideaused'){const rec=S.nights.find(x=>x.id===t.dataset.id);
    if(rec&&rec.review){rec.review.nextUsed=!rec.review.nextUsed;save('nights');render();}return;}
  if(a==='revtoggle'){const t=viewTerm();t._revOpen=!t._revOpen;render();return;}
  if(a==='shareplan'){fb(termPlanText(viewTerm()),t);return;}
  if(a==='termics'){termICS(viewTerm());return;}
  if(a==='termpdf'){printTermPlan();return;}
  if(a==='r1sec'){const it=planFind(S._r1Id).it;if(!it)return;
    it.r1.sections[t.dataset.s]=!it.r1.sections[t.dataset.s];save('year');render();return;}
  if(a==='r1addrow'){const it=planFind(S._r1Id).it;if(!it)return;
    it.r1[t.dataset.k].push({hazard:'',injury:'',C:'',L:'',controls:'',nC:'',nL:''});
    save('year');render();return;}
  if(a==='r1delrow'){const it=planFind(S._r1Id).it;if(!it)return;
    it.r1[t.dataset.k].splice(+t.dataset.i,1);save('year');render();return;}
  if(a==='r1dl'){const it=planFind(S._r1Id).it;if(!it)return;
    buildR1(it.r1).then(blob=>{
      const url=URL.createObjectURL(blob);const el=document.createElement('a');
      el.href=url;el.download='R1-'+(it.r1.name||'event').replace(/[^a-z0-9]+/gi,'_')+'.xlsx';
      document.body.appendChild(el);el.click();el.remove();
    }).catch(()=>uiAlert('R1 template not available yet — open the app online once, then try again.'));
    return;}
  if(a==='ics'){const f=planFind(t.dataset.id),it=f.it;if(!it)return;
    if(it.kind==='event'){
      if(!it.startDate){uiAlert('Give the event a start date first.');return;}
      downloadICS((it.activity||it.type)+' — Scouts',it.startDate,it.endDate||it.startDate,it.timeStart||'',it.timeEnd||'');
    }else{
      const tm=S.year.terms[f.t];let wn=0;
      for(const x of tm.items){if(x.kind==='week')wn++;if(x.id===it.id)break;}
      const iso=weekDateISO(tm,wn);if(!iso){uiAlert('Set the term start date first.');return;}
      const title=(it.type==='Activity'?(it.activity||'Scout night'):it.type)+' — Scouts';
      downloadICS(title,iso,iso,tm.timeStart||'',tm.timeEnd||'');
    }return;}
  if(a==='weeks'){const d=+t.dataset.d,its=viewTerm().items;
    if(d>0){let li=-1;its.forEach((x,i)=>{if(x.kind==='week')li=i;});
      const nw={id:uid(),kind:'week',type:'Activity',activity:'',areas:[]};
      li<0?its.push(nw):its.splice(li+1,0,nw);}
    if(d<0){const wks=its.filter(x=>x.kind==='week');if(wks.length>1){
      let li=-1;its.forEach((x,i)=>{if(x.kind==='week')li=i;});
      const rm=its[li];its.splice(li,1);
      if(S.year.cur&&S.year.cur.id===rm.id)S.year.cur=null;}}
    save('year');render();return;}
  if(a==='addevent'){const arr=planContainer(t.dataset.id);if(!arr)return;
    const i=arr.findIndex(x=>x.id===t.dataset.id);
    arr.splice(i+1,0,{id:uid(),kind:'event',type:'Camp',activity:'',areas:[]});
    save('year');render();return;}
  if(a==='addyearevent'){S.year.events.push({id:uid(),kind:'event',type:'Camp',activity:'',areas:[]});
    save('year');render();return;}
  if(a==='delitem'){const id=t.dataset.id;uiConfirm('Remove this event from the plan?',()=>{
    const arr=planContainer(id);if(!arr)return;
    if(S.year.cur&&S.year.cur.id===id)S.year.cur=null;
    arr.splice(arr.findIndex(x=>x.id===id),1);save('year');render();});return;}
  if(a==='setcurrent'){const id=t.dataset.id;
    S.year.cur=(S.year.cur&&S.year.cur.id===id)?null:{t:planFind(id).t,id};save('year');
    if(!S.night.saved&&S.night.step===1){applyCurrent(S.night);save('night');}
    render();return;}
  if(a==='wkarea'){const it=planFind(t.dataset.id).it,ar=t.dataset.area;if(!it)return;
    it.areas.includes(ar)?it.areas=it.areas.filter(x=>x!==ar):it.areas.push(ar);
    save('year');render();return;}
  if(a==='rolestoggle'){const it=planFind(t.dataset.id).it;if(!it)return;
    it._rolesOpen=!it._rolesOpen;render();return;}
  if(a==='plangrp'){const it=planFind(t.dataset.id).it;if(!it)return;
    const gi=+t.dataset.g;it._openG=(it._openG===gi?null:gi);save('year');render();return;}
  if(a==='planskill'){const it=planFind(t.dataset.id).it;if(!it)return;
    const id=t.dataset.sk;it.targetSkills=it.targetSkills||[];
    const ix=it.targetSkills.findIndex(s=>s.id===id);
    if(ix>=0)it.targetSkills.splice(ix,1);
    else{const p=id.split('|');const grp=OAS_SKILLS[p[0]]&&OAS_SKILLS[p[0]][+p[1]];
      it.targetSkills.push({id,name:skillName(id),stage:grp?grp[0]:null});}
    save('year');render();return;}
  if(a==='setrole'){const it=planFind(t.dataset.id).it;if(!it)return;
    it.roles=it.roles||{};const sid=t.dataset.sid,r=t.dataset.r;
    if(r==='-')delete it.roles[sid];else it.roles[sid]=r;
    save('year');render();return;}
  /* troop */
  if(a==='addscout'){const inp=document.getElementById('newScout'),v=(inp?inp.value:'').trim();
    if(!v)return;S.roster.push({id:uid(),name:v,section:'Scout',peak:false,milestone:1,memberNo:"",sias:[],priorKm:0,priorNights:0,peakSteps:TEN_F.slice()});
    save('roster');S._focus='newScout';render();return;}
  if(a==='scopen'){const s=S.roster.find(x=>x.id===t.dataset.id);s._open=!s._open;render();return;}
  if(a==='troopview'){S._troopView=t.dataset.v;render();return;}
  if(a==='secfilter'){S._secF=S._secF||{};S._secF[t.dataset.s]=!S._secF[t.dataset.s];render();return;}
  if(a==='scprole'){const s=S.roster.find(x=>x.id===t.dataset.id);
    if(s){s.prole=t.dataset.r;save('roster');render();}return;}
  if(a==='chartrow'){const s=S.roster.find(x=>x.id===t.dataset.id);
    if(s){S._troopView='cards';s._open=true;render();}return;}
  if(a==='nameedit'){const s=S.roster.find(x=>x.id===t.dataset.id);s._editName=!s._editName;render();return;}
  if(a==='peak'){const s=S.roster.find(x=>x.id===t.dataset.id);s.peak=!s.peak;save('roster');render();return;}
  if(a==='peakstep'){const s=S.roster.find(x=>x.id===t.dataset.id);
    const i=+t.dataset.i;
    if(PEAK_AUTO.includes(i))return; // auto steps are computed from the ledger, not tappable
    if(!s.peakSteps||s.peakSteps.length<10)s.peakSteps=TEN_F.slice();
    s.peakSteps[i]=!s.peakSteps[i];save('roster');render();return;}
  if(a==='addsia'){const id=t.dataset.id,s=S.roster.find(x=>x.id===id);
    const ar=document.getElementById('siaArea-'+id).value;
    const de=document.getElementById('siaDesc-'+id).value.trim();
    const dt=document.getElementById('siaDate-'+id).value;
    s.sias=s.sias||[];s.sias.push({id:uid(),area:ar,description:de,date:dt});
    save('roster');render();return;}
  if(a==='delsia'){const s=S.roster.find(x=>x.id===t.dataset.id);
    s.sias=(s.sias||[]).filter(x=>x.id!==t.dataset.sia);save('roster');render();return;}
  if(a==='delscout'){const id=t.dataset.id,s=S.roster.find(x=>x.id===id);
    uiConfirm('Remove '+(s?s.name:'this member')+'? Their saved night records stay logged.',()=>{
      S.roster=S.roster.filter(x=>x.id!==id);save('roster');render();});return;}
  /* comms */
  /* welcome */
  if(a==='faqadd'){S.welcome.faqs.push({id:uid(),q:'',a:''});save('welcome');render();return;}
  if(a==='faqdel'){const id=t.dataset.id;uiConfirm('Remove this question?',()=>{
    S.welcome.faqs=S.welcome.faqs.filter(x=>x.id!==id);save('welcome');render();});return;}
  if(a==='invadd'){S.welcome.invest.push({id:uid(),txt:''});save('welcome');render();return;}
  if(a==='invdel'){const id=t.dataset.id;uiConfirm('Remove this step?',()=>{
    S.welcome.invest=S.welcome.invest.filter(x=>x.id!==id);save('welcome');render();});return;}
  if(a==='fileadd'){S.welcome.files.push({id:uid(),name:'',url:'',note:''});save('welcome');render();return;}
  if(a==='filedel'){const id=t.dataset.id;uiConfirm('Remove this link?',()=>{
    S.welcome.files=S.welcome.files.filter(x=>x.id!==id);save('welcome');render();});return;}
  if(a==='filecopy'){const f=S.welcome.files.find(x=>x.id===t.dataset.id);const txt=(f&&f.url)||'';
    if(!txt){uiAlert('No link saved on that one yet.');return;}
    if(navigator.clipboard)navigator.clipboard.writeText(txt).then(
      ()=>{t.textContent='Copied ✓';setTimeout(()=>t.textContent='Copy link',1600);},
      ()=>fb(txt,t));else fb(txt,t);return;}
  /* drive */
  if(a==='dconnect'){driveConnect();return;}
  if(a==='dsync'){driveSync('manual');return;}
  if(a==='ddisconnect'){S.drive.enabled=false;S.drive.tok=null;S.drive.status='';saveDrive();render();return;}
  if(a==='dclearid'){uiConfirm('Clear the saved Client ID?',()=>{
    S.drive.clientId='';S.drive.enabled=false;S.drive.tok=null;saveDrive();render();});return;}
  /* rules */
  if(a==='export'){
    const blob=new Blob([JSON.stringify({roster:S.roster,year:S.year,nights:S.nights,welcome:S.welcome,contacts:S.contacts},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob),link=document.createElement('a');
    link.href=url;link.download='starlord-command-backup-'+todayISO()+'.json';link.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);return;}
  if(a==='import'){uiPrompt('Import data','Paste a Star-Lord Command backup below to restore it.',(txt)=>{
    if(!txt||!txt.trim())return;
    try{const d=JSON.parse(txt);
      if(d.roster)S.roster=d.roster;
      if(d.year)S.year=migrateYear(d.year,null);else if(d.term)S.year=migrateYear(null,d.term);
      if(d.nights)S.nights=d.nights;
      if(d.welcome)S.welcome=d.welcome;if(d.contacts)S.contacts=d.contacts;
      rosterDefaults();
      save('roster');save('year');save('nights');save('welcome');save('contacts');render();uiAlert('Backup restored.');}
    catch(err){uiAlert('That does not look like valid backup data.');}});return;}
  if(a==='scoutmode'){S.mode='scout';render();return;}
  if(a==='scoutnav'){S.scoutView=t.dataset.v;render();return;}
  if(a==='schedtick'){const it=planFind(t.dataset.id).it;if(it){const r=ensurePlan(it).sched[+t.dataset.i];if(r){r.done=!r.done;save('year');render();}}return;}
  if(a==='unlockleader'){
    if(!S.pin){
      uiPrompt('Set the leader PIN','First time on this device — pick the PIN that unlocks leader mode. It sticks until you change it.',(v)=>{
        if(!v||!v.trim())return uiAlert('Need a PIN.');
        S.pin=v.trim();Store.set('muster.pin',S.pin);S.mode='leader';render();});
      return;}
    uiPrompt('Leader unlock','Enter the leader PIN.',(v)=>{
      if((v||'').trim()===S.pin){S.mode='leader';render();}
      else uiAlert('Wrong PIN.');});
    return;}
  if(a==='nptoggle'){const it=planFind(t.dataset.id).it;if(it){
    it._planOpen=!it._planOpen;
    if(it._planOpen){const p=ensurePlan(it);
      if(!p.sched.length){p.sched=[
        {t:'6:00',w:'Flag break & opening',o:'P'},
        {t:'6:10',w:'Game — flag patrol runs it while lead & assist set up',o:'P'},
        {t:'6:30',w:it.activity||'Main activity',o:'L'},
        {t:'7:40',w:'Review — lead reads it out',o:'L'},
        {t:'7:50',w:'Flag down & close',o:'P'}];save('year');}
      it._planStep=[1,2,3,4,5].find(s=>!planStepsDone(it)[s])||5;}
    render();}return;}
  if(a==='npstep'){const it=planFind(t.dataset.id).it;if(it){it._planStep=Math.min(5,Math.max(1,+t.dataset.s));render();}return;}
  if(a==='npsubmit'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).status='submitted';save('year');render();}return;}
  if(a==='npcheck'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).status='checked';save('year');render();}return;}
  if(a==='npback'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).status='';save('year');render();}return;}
  if(a==='aateam'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).aaTeam=t.dataset.v;it._planOpen=true;save('year');render();}return;}
  if(a==='permneed'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).permNeeded=t.dataset.v;it._planOpen=true;save('year');render();}return;}
  if(a==='schedadd'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).sched.push({d:'',t:'',w:''});it._planOpen=true;save('year');render();}return;}
  if(a==='scheddel'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).sched.splice(+t.dataset.i,1);save('year');render();}return;}
  if(a==='bgive'||a==='bundo'){const s=S.roster.find(x=>x.id===t.dataset.id);if(!s)return;
    s.badges=s.badges||{};
    if(a==='bgive')s.badges[t.dataset.k]=todayISO();else delete s.badges[t.dataset.k];
    save('roster');render();return;}
  if(a==='wbimport'){
    const matched=[],unmatched=[];
    S.roster.forEach(s=>{const w=WB_IMPORT[(s.memberNo||'').trim()];if(w)matched.push([s,w]);});
    Object.keys(WB_IMPORT).forEach(num=>{
      if(!S.roster.some(s=>(s.memberNo||'').trim()===num))unmatched.push(WB_IMPORT[num]);});
    if(!matched.length){uiAlert('No scouts matched by member number. Check member numbers are entered in the Youth tab.');return;}
    const SH={Community:'C',Creative:'Cr',Outdoors:'O','Personal Growth':'PG',A:'Assist',L:'Lead'};
    const lines=matched.map(([s,w])=>{
      const ob=Object.entries(w.opening).map(([k,v])=>`${SH[k]||k} ${v}`).join(', ')||'none';
      const oas=Object.entries(w.oasFrom).map(([k,v])=>`${k} ${v}`).join(', ')||'none';
      return `${s.name} → M${w.milestone}  |  ${ob}  |  OAS: ${oas}`;
    }).join('\n');
    const extra=unmatched.length?`\n\nNot matched (${unmatched.length}): ${unmatched.map(u=>u.name).join(', ')}. Add their member number to import them.`:'';
    uiConfirm(`Update ${matched.length} scout${matched.length>1?'s':''} to match the workbooks (milestone, opening balance, OAS start). Nothing logged on nights changes.\n\n${lines}${extra}`,
      ()=>{
        matched.forEach(([s,w])=>{
          s.milestone=w.milestone;
          s.msOpening=s.msOpening||{1:emptyMS(),2:emptyMS(),3:emptyMS()};
          const ob=emptyMS();Object.entries(w.opening).forEach(([k,v])=>ob[k]=v);
          s.msOpening[w.milestone]=ob;
          s.oasStart=s.oasStart||{};Object.entries(w.oasFrom).forEach(([k,v])=>s.oasStart[k]=v);
          if(w.section&&!s.section)s.section=w.section;
        });
        save('roster');render();uiAlert(`Imported ${matched.length} scout${matched.length>1?'s':''} from the workbooks.`);
      });
    return;}
});
function fb(txt,btn){const ta=document.createElement('textarea');ta.value=txt;
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');btn.textContent='Copied ✓';
    setTimeout(()=>btn.textContent='Copy summary',1600);}catch(e){}
  document.body.removeChild(ta);}
document.addEventListener('input',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;const a=t.dataset.act;
  if(a==='ntext'){S.night[t.dataset.f]=t.value;save('night');
    if(t.dataset.f==='signedBy'||t.dataset.f==='plBy'){const b=document.querySelector('[data-act="signoff"]');
      if(b){const ok=S.night.activity.trim()&&S.night.areas.length&&(S.night.signedBy||'').trim()&&(S.night.plBy||'').trim();
        b.disabled=!ok;b.style.opacity=ok?'1':'.45';}}}
  if(a==='wkact'){const it=planFind(t.dataset.id).it;if(it){it.activity=t.value;save('year');}}
  if(a==='npf'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it)[t.dataset.f]=t.value;save('year');}}
  if(a==='wktime'){const it=planFind(t.dataset.id).it;if(it){it.time=t.value;save('year');}}
  if(a==='schedf'){const it=planFind(t.dataset.id).it;if(it){const r=ensurePlan(it).sched[+t.dataset.i];if(r){r[t.dataset.f]=t.value;save('year');}}}
  if(a==='npskillhow'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).skillHow[t.dataset.k]=t.value;save('year');}}
  if(a==='nprev'){const it=planFind(t.dataset.id).it;if(it){ensurePlan(it).review[t.dataset.f]=t.value;save('year');}}
  if(a==='nrevf'){S.night.review[t.dataset.f]=t.value;save('night');}
  if(a==='revf'){const tm=viewTerm();tm.review=tm.review||{worked:'',tricky:'',ideas:''};
    tm.review[t.dataset.f]=t.value;save('year');}
  if(a==='r1f'){const it=planFind(S._r1Id).it;if(it&&it.r1){r1Set(it.r1,t.dataset.f,t.value);save('year');
    if(t.tagName==='SELECT')render();}}
  if(a==='oasstart'){const s=S.roster.find(x=>x.id===t.dataset.id);
    if(s){s.oasStart=s.oasStart||{};s.oasStart[t.dataset.st]=+t.value;save('roster');render();}return;}
  if(a==='scpatrol'){const s=S.roster.find(x=>x.id===t.dataset.id);if(s){s.patrol=t.value;save('roster');}}
  if(a==='scdate'){const s=S.roster.find(x=>x.id===t.dataset.id);if(s){s[t.dataset.f]=t.value;save('roster');}}
  if(['g1n','g1p','g1e','g2n','g2p','g2e'].includes(a)){const s=S.roster.find(x=>x.id===t.dataset.id);if(s){
    s[{g1n:'g1name',g1p:'g1phone',g1e:'g1email',g2n:'g2name',g2p:'g2phone',g2e:'g2email'}[a]]=t.value;save('roster');}}
  if(a==='dclientid'){S.drive.clientId=t.value.trim();saveDrive();renderDriveStatus();}
  if(a==='faqq'||a==='faqa'){const f=S.welcome.faqs.find(x=>x.id===t.dataset.id);
    if(f){f[a==='faqq'?'q':'a']=t.value;save('welcome');}}
  if(a==='invtxt'){const f=S.welcome.invest.find(x=>x.id===t.dataset.id);if(f){f.txt=t.value;save('welcome');}}
  if(a==='filen'||a==='fileu'||a==='filenote'){const f=S.welcome.files.find(x=>x.id===t.dataset.id);
    if(f){f[{filen:'name',fileu:'url',filenote:'note'}[a]]=t.value;save('welcome');}}
  if(a==='kmlog'){const v=t.value;v===''?delete S.night.kmLog[t.dataset.id]:S.night.kmLog[t.dataset.id]=+v;save('night');}
  if(a==='nightslog'){const v=t.value;v===''?delete S.night.nightsLog[t.dataset.id]:S.night.nightsLog[t.dataset.id]=+v;save('night');}
  if(a==='priorkm'){const s=S.roster.find(x=>x.id===t.dataset.id);s.priorKm=+t.value||0;save('roster');}
  if(a==='obset'){const s=S.roster.find(x=>x.id===t.dataset.id);if(s){const cm=s.milestone||1;s.msOpening=s.msOpening||{};if(!s.msOpening[cm])s.msOpening[cm]=emptyMS();s.msOpening[cm][t.dataset.k]=Math.max(0,+t.value||0);save('roster');}}
  if(a==='priornights'){const s=S.roster.find(x=>x.id===t.dataset.id);s.priorNights=+t.value||0;save('roster');}
  if(a==='scoutname'){const s=S.roster.find(x=>x.id===t.dataset.id);if(s){s.name=t.value;save('roster');
    const hd=t.closest('.scout');if(hd){const nm=hd.querySelector('.hd .nm');
      if(nm)nm.innerHTML=esc(t.value)+(s.memberNo?' <span class="mno">#'+esc(s.memberNo)+'</span>':'')+(s.peak?' <span class="peak-star">★</span>':'');}}}
  if(a==='scoutno'){const s=S.roster.find(x=>x.id===t.dataset.id);if(s){s.memberNo=t.value;save('roster');
    const hd=t.closest('.scout');if(hd){const nm=hd.querySelector('.hd .nm');
      if(nm)nm.innerHTML=esc(s.name)+(t.value?' <span class="mno">#'+esc(t.value)+'</span>':'')+(s.peak?' <span class="peak-star">★</span>':'');}}}
});
document.addEventListener('change',e=>{
  const t=e.target.closest('[data-act]');if(!t)return;const a=t.dataset.act;
  if(a==='ntext'){S.night[t.dataset.f]=t.value;save('night');if(t.dataset.f==='stream')render();return;}
  if(a==='r1f'){const it=planFind(S._r1Id).it;if(it&&it.r1){r1Set(it.r1,t.dataset.f,t.value);save('year');
    if(t.tagName==='SELECT')render();}return;}
  if(a==='pickweek'){if(t.value){S.year.cur={t:planFind(t.value).t,id:t.value};save('year');}
    applyCurrent(S.night);save('night');render();return;}
  if(a==='wktype'){const it=planFind(t.dataset.id).it;if(it){it.type=t.value;save('year');}render();return;}
  if(a==='termstart'){viewTerm().startDate=t.value;save('year');render();return;}
  if(a==='evstart'){const it=planFind(t.dataset.id).it;if(it){it.startDate=t.value;save('year');}return;}
  if(a==='evend'){const it=planFind(t.dataset.id).it;if(it){it.endDate=t.value;save('year');}return;}
  if(a==='evstime'){const it=planFind(t.dataset.id).it;if(it){it.timeStart=t.value;save('year');}return;}
  if(a==='evetime'){const it=planFind(t.dataset.id).it;if(it){it.timeEnd=t.value;save('year');}return;}
  if(a==='schedo'){const it=planFind(t.dataset.id).it;if(it){const r=ensurePlan(it).sched[+t.dataset.i];if(r){r.o=t.value;save('year');render();}}return;}
  if(a==='ttimes'){viewTerm().timeStart=t.value;save('year');render();return;}
  if(a==='ttimee'){viewTerm().timeEnd=t.value;save('year');render();return;}
  if(a==='evtype'){const it=planFind(t.dataset.id).it;if(it){it.type=t.value;save('year');}render();return;}
  if(a==='planstream'){const it=planFind(t.dataset.id).it;if(it){it.stream=t.value;it._openG=null;save('year');}render();return;}
  if(a==='ctag'){const c=S.contacts.find(x=>x.id===t.dataset.id);if(c){c.tag=t.value;save('contacts');render();}return;}
  if(a==='setms'){const s=S.roster.find(x=>x.id===t.dataset.id);
    // "Started at" = arrival milestone anchor for the opening balance.
    // Current milestone is derived by roll-up, so no snapshot bookkeeping.
    s.milestone=+t.value;save('roster');render();return;}
  if(a==='obtoggle'){const s=S.roster.find(x=>x.id===t.dataset.id);s._obEdit=!s._obEdit;render();return;}
  if(a==='setsec'){const s=S.roster.find(x=>x.id===t.dataset.id);s.section=t.value;save('roster');render();return;}
});
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(e.target.id==='newScout'){e.preventDefault();const v=e.target.value.trim();
    if(v){S.roster.push({id:uid(),name:v,section:'Scout',peak:false,milestone:1,memberNo:"",sias:[],priorKm:0,priorNights:0,peakSteps:TEN_F.slice()});
      save('roster');S._focus='newScout';render();}}
});
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target.id==='modal')closeModal();
});
parseAuthHash();
load().then(()=>{render();driveBoot();});
</script>
